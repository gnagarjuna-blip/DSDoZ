<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Certification | Customer Experience Management - Day 2</title>
    <style>
        :root {
            --alorica-red: #de2127; --navy: #0f172a; --slate: #1e293b;
            --ghost: #f8fafc; --gold: #b45309; --emerald: #059669;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--ghost); color: var(--slate); margin: 0; line-height: 1.8;
        }
        
        /* Layout Structure */
        .app-container { display: flex; min-height: 100vh; width: 100vw; overflow-x: hidden; }
        
        /* Professional Sidebar */
        .sidebar { 
            width: 350px; background: var(--navy); color: white; 
            padding: 40px 0; position: fixed; height: 100vh; z-index: 100;
        }
        .brand-logo { 
            padding: 0 30px 40px; font-size: 1.4rem; font-weight: 900; 
            letter-spacing: 1px; color: var(--alorica-red); border-bottom: 1px solid #334155;
        }
        .nav-group { margin-top: 30px; }
        .nav-link { 
            padding: 20px 30px; display: block; color: #94a3b8; text-decoration: none;
            font-weight: 600; transition: 0.3s; cursor: pointer; border-left: 5px solid transparent;
        }
        .nav-link:hover { background: #1e293b; color: white; }
        .nav-link.active { background: #1e293b; color: white; border-left-color: var(--alorica-red); }

        /* Main Content Area */
        .content-body { margin-left: 350px; padding: 80px 10%; width: calc(100% - 350px); }
        .certification-card { 
            background: white; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            padding: 60px; border-top: 8px solid var(--alorica-red);
        }

        /* Typography */
        h1 { font-size: 2.8rem; color: var(--navy); margin-bottom: 40px; font-weight: 800; }
        h2 { font-size: 1.8rem; color: var(--navy); margin: 50px 0 20px; border-left: 6px solid var(--alorica-red); padding-left: 20px; }
        .exec-summary { font-size: 1.2rem; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
        
        /* High-Depth Content */
        .theory-section { text-align: justify; color: #334155; font-size: 1.1rem; }
        .theory-paragraph { margin-bottom: 30px; }

        /* Multi-Paragraph Case Studies */
        .case-wrapper { margin: 60px 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .case-header { background: #f1f5f9; padding: 25px 40px; font-weight: 800; border-bottom: 1px solid #e2e8f0; color: var(--gold); }
        .case-content { padding: 40px; background: #fffcf5; }
        .case-solution { padding: 40px; background: #f0fdf4; border-top: 2px solid #dcfce7; }
        .p-space { margin-bottom: 20px; }

        /* Drill Components */
        .drill-block { background: #fff; border: 2px solid #cbd5e1; border-radius: 8px; margin-bottom: 40px; }
        .drill-header { background: var(--slate); color: white; padding: 20px 30px; font-weight: 700; }
        .drill-body { padding: 30px; }

        /* Exam Components */
        .exam-header { text-align: center; background: var(--navy); color: white; padding: 40px; margin: -60px -60px 60px; }
        .q-block { margin-bottom: 60px; padding: 30px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .q-scenario { font-style: italic; color: #475569; margin-bottom: 25px; border-bottom: 1px solid #cbd5e1; padding-bottom: 20px; font-size: 1rem; }
        .option-label { 
            display: block; padding: 18px 25px; background: white; border: 2px solid #e2e8f0;
            border-radius: 8px; margin-top: 15px; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .option-label:hover { border-color: var(--alorica-red); background: #fef2f2; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        .btn-primary { 
            width: 100%; padding: 25px; background: var(--alorica-red); color: white; border: none;
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 40px;
        }
        .btn-retake { background: var(--navy); margin-top: 20px; }

        /* Pass/Fail Overlay */
        #result-overlay { 
            display: none; padding: 40px; border-radius: 12px; text-align: center; margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand-logo">ALORICA GLOBAL LEADERSHIP</div>
        <nav class="nav-group">
            <div class="nav-link active" id="nav-theory" onclick="navigate('theory')">Day 2 Core Strategy</div>
            <div class="nav-link" id="nav-cases" onclick="navigate('cases')">Day 2 Case Studies</div>
            <div class="nav-link" id="nav-drills" onclick="navigate('drills')">Operational Drills</div>
            <div class="nav-link" id="nav-exam" onclick="navigate('exam')">Day 2 Certification Exam</div>
        </nav>
    </aside>

    <main class="content-body" id="main-view">
        </main>
</div>

<script>
    // --- DATABASE ---
    const DB = {
        theory: {
            title: "Day 2: Advanced Omnichannel Orchestration & Predictive CX Analytics",
            content: `
                <div class="theory-section">
                    <div class="exec-summary">Architecting the Digital Experience Ecosystem</div>
                    <p class="theory-paragraph">On Day 2 of Customer Experience Management, the strategic focus pivots from single-touch service recovery models to the architectural integration of multidimensional touchpoints. In a world defined by transactional complexity, the modern Customer Experience Manager (CXM) must orchestrate an ecosystem where text, speech analytics, asynchronous messaging, and automated agents interact seamlessly. The metric of success has evolved from First Call Resolution (FCR) to Omnichannel Journey Continuity. Friction manifests when a consumer faces contextual amnesia—defined as the system's inability to retain transactional intent across channel migrations, forcing a repetitive validation loop.</p>
                    <p class="theory-paragraph">A critical tool under the modern CXM's purview is Real-Time Sentiment Analytics (RTSA). RTSA pipelines ingest acoustic, semantic, and metadata properties to assign dynamic effort ratings during live agent encounters. By tracking acoustic pitch fluctuations and conversational cross-talk patterns, the infrastructure triggers immediate supervisor alerts or algorithmic script augmentations. Moving beyond baseline quality assurance, this training focuses on utilizing predictive intent categorization to dynamically route customers before a voice channel escalation becomes necessary, driving down operational costs by capitalizing on lower-cost asynchronous messaging networks.</p>
                    <p class="theory-paragraph">Furthermore, Day 2 unpacks the integration of Generative AI Copilots with core Customer Relationship Management (CRM) databases. The CXM must define the "Guardrail Parameters" that prevent machine-learned hallucination while maximizing conversational velocity. Implementing automated agent assistance allows frontline personnel to bypass manual Knowledge Base searches, shaving critical seconds off Average Handle Time (AHT) while ensuring a uniform brand perspective. We will evaluate how to navigate the technical divide between legacy database frameworks and cloud-native API abstractions to ensure real-time personal data surfaces securely at the point of customer engagement.</p>
                </div>
            `
        },
        cases: [
            {
                title: "CASE 01: The Fractured Omnichannel Migration Failure",
                problem: `
                    <p class="p-space">A tier-one banking enterprise implemented an updated mobile application platform that accidentally locked out 50,000 legacy users due to an automated API validation error. When users migrated to web-based chat services to seek assistance, the system failed to pass their session tokens. This forced users to re-verify their identities across multiple security gates, resulting in a systemic bottleneck.</p>
                    <p class="p-space">Compounding the crisis, the automated interactive voice response (IVR) setup failed to recognize the influx of users attempting to bypass the broken digital platforms. The separation between the digital application support branch and the core voice telephony infrastructure resulted in conflicting messaging, long queues, and a 28-point drop in Net Promoter Score over a 48-hour period.</p>
                `,
                solution: `
                    <p class="p-space">The CX Manager deployed an immediate emergency middleware update that extracted session metadata and automatically generated temporary authentication bypass keys for affected customers. Simultaneously, they implemented unified desktop interfaces for the agent workforce, which immediately displayed a customer's cross-channel pathway logs.</p>
                    <p class="p-space">By creating a centralized repository for cross-channel intent, agents were able to instantly bypass repetitive authentication requirements. This structural integration stabilized the cross-channel migration path, cut customer handle time by 45%, and completely eliminated the redundant verification friction that drove the original escalation wave.</p>
                `
            },
            {
                title: "CASE 02: Algorithmic Recovery and Sentiment Calibration",
                problem: `
                    <p class="p-space">A high-volume global travel platform deployed an automated notification engine to inform passengers of flight cancellations during an extreme weather event. The automated notifications utilized cold, compliance-heavy language that triggered widespread panic. Customers swarmed both digital channels and social media profiles simultaneously.</p>
                    <p class="p-space">The internal customer support systems lacked conversational analytics capabilities to properly categorize callers based on panic levels or cancellation severity. As a result, standard premium flyers were left stuck in general assistance lines, while low-tier transactional users clogged high-priority emergency support paths, creating systemic service disruption.</p>
                `,
                solution: `
                    <p class="p-space">The CX Manager intervened by implementing a real-time semantic analysis patch that scanned digital message patterns and incoming text for high-stress keywords. The platform automatically re-routed high-stress interactions directly to senior recovery agents equipped with immediate compensation authority.</p>
                    <p class="p-space">They also adjusted the automated outbound notification templates to mirror a proactive and supportive tone, offering direct links to self-service rebooking portals. This strategy successfully diverted 60% of the conversational volume away from standard voice lines while simultaneously protecting the high-value traveler segments.</p>
                `
            },
            {
                title: "CASE 03: The Asynchronous Scaling Dynamic",
                problem: `
                    <p class="p-space">An international e-commerce conglomerate faced an unpredicted logistics block where delivery estimations for thousands of tech orders slipped by two weeks. Standard operations relied heavily on telephony channels, but agent capacity maxed out instantly. The average wait time soared past 90 minutes, driving high abandonment numbers.</p>
                    <p class="p-space">Because customers couldn't get updates, they double-ticketed across Facebook, email, and live chat, resulting in triplicate data loops. The operation faced an extreme risk of contract penalties due to missing target SLAs across all metrics.</p>
                `,
                solution: `
                    <p class="p-space">The CXM immediately locked synchronous voice access for non-urgent tracking inquiries, changing the main interactive voice script to transfer users directly to an enriched WhatsApp/SMS asynchronous gateway via an automated link.</p>
                    <p class="p-space">Agents were upskilled onto multi-session dashboard interfaces, raising concurrency ratios from 1:1 voice calls to 1:4 active digital messaging slots. By organizing conversation logs by issue urgency instead of chronologically, the operation cleared the 3-day backup in 24 hours, stabilizing operational SLAs while decreasing handling costs.</p>
                `
            }
        ],
        drills: [
            {
                title: "Drill 01: Multi-Channel Data Mapping Scenario",
                instruction: "Analyze a complex cross-channel log where a user moves from an automated chatbot to a live phone agent. Draft a clear context-handover summary that a live phone agent can review in under 5 seconds to eliminate customer repetition."
            },
            {
                title: "Drill 02: AI Copilot Guardrail Structuring",
                instruction: "Draft a system prompt rulebook for a generative AI customer service agent handling billing discrepancies. Your guardrails must explicitly prevent the AI from offering unauthorized statement credits while maintaining an empathetic tone."
            }
        ],
        exam: [
            {
                id: 1,
                scenario: "A retail brand's mobile application crashes during a product drop. Customers who transition from the app's chat feature to the call center are forced to re-verify their account numbers and detail their issues again. What type of systemic failure does this represent?",
                options: [
                    "Contextual Amnesia due to a lack of unified channel state persistence",
                    "Acoustic fluctuation anomaly within the interactive voice response architecture",
                    "Defensive messaging lag caused over-reliance on self-service portals",
                    "Linguistic branding mismatch between internal service departments"
                ],
                correct: 0
            },
            {
                id: 2,
                scenario: "During a major service outage, real-time sentiment analytics indicate that customer effort scores are spiking on text channels due to long agent response times. Which operational adjustment should a CX Manager implement immediately?",
                options: [
                    "Increase the target Average Handle Time (AHT) requirements for all active agents",
                    "Deploy proactive status banners on digital channels and shift idle voice agents to asynchronous messaging text queues",
                    "Disable digital text messaging options to force all customers into primary voice lines",
                    "Initiate an emergency audit of legacy database hardware systems"
                ],
                correct: 1
            },
            {
                id: 3,
                scenario: "An AI customer service bot mistakenly promises a customer a full refund on a non-refundable ticket because of an ambiguous prompt. To prevent machine-learned hallucinations or unauthorized concessions without hurting the user experience, a CXM should:",
                options: [
                    "Remove the AI layer entirely and handle all incoming traffic via standard voice queues",
                    "Configure hard data-validation guardrails that restrict the AI from changing financial states without human supervisor review",
                    "Force the customer to re-authenticate their profile every time the AI generates a response",
                    "Train agents to manually overwrite all conversational logs at the end of every shift"
                ],
                correct: 1
            },
            {
                id: 4,
                scenario: "Which metric best quantifies the effectiveness of an omni-channel customer service framework in preserving customer history across multiple service platforms?",
                options: [
                    "Average Talk Time (ATT)",
                    "Abandonment Rate (AR)",
                    "Omnichannel Journey Continuity Score (low repeat verification rates)",
                    "Schedule Adherence Percentage"
                ],
                correct: 2
            },
            {
                id: 5,
                scenario: "A telecom provider notices that customers who use their digital self-service portal to resolve billing issues often call back within 48 hours anyway. This trend indicates a high risk of:",
                options: [
                    "Acoustic cross-talk interference on digital lines",
                    "Faux Resolution Masking, where digital tasks are marked complete but fail to address the root problem",
                    "Positive correlation with the Service Recovery Paradox",
                    "Horizontal integration overload across legacy databases"
                ],
                correct: 1
            },
            {
                id: 6,
                scenario: "A real-time sentiment tracking pipeline detects an unusual volume of customers using high-stress language on social media profiles after an update. What is the CXM's primary strategic action?",
                options: [
                    "Issue a boilerplate legal statement asking users to stop posting negative content",
                    "Deploy automated, high-authority sentiment responses that redirect users to specialized human triage teams",
                    "Instruct front-line agents to lower their pitch during standard phone consultations",
                    "Temporarily pause the customer relationship management database systems"
                ],
                correct: 1
            },
            {
                id: 7,
                scenario: "When integrating cloud-native API abstractions with legacy backend database infrastructures, what is the primary customer experience hazard?",
                options: [
                    "Data latency that causes temporary information gaps for front-line agents during live sessions",
                    "An excessive reduction in customer authentication verification steps",
                    "The automatic optimization of agent shift schedules",
                    "Increased customer reliance on low-cost asynchronous messaging networks"
                ],
                correct: 0
            },
            {
                id: 8,
                scenario: "An elite airline passenger gets stuck in a standard, low-priority voice queue during an airport weather delay. This reflects a failure in which advanced CX field?",
                options: [
                    "Linguistic validation alignment protocols",
                    "Predictive routing based on customer tiering and real-time intent categorization",
                    "Somatic pacing training methodologies",
                    "Post-incident quality assurance sample parsing"
                ],
                correct: 1
            },
            {
                id: 9,
                scenario: "To implement an effective predictive journey mapping framework, a CX Manager must analyze:",
                options: [
                    "Historical customer dissatisfaction patterns aligned with operational milestones or system updates",
                    "Individual agent attendance histories across previous operational years",
                    "Standard script templates used by competitive customer service providers",
                    "The baseline market cap of the primary technical software vendors"
                ],
                correct: 0
            },
            {
                id: 10,
                scenario: "What unique benefit does asynchronous messaging bring to a BPO operation during a volume surge, compared to standard synchronous voice sessions?",
                options: [
                    "It requires customers to remain completely focused on the chat window until it is resolved",
                    "It allows a single agent to manage multiple customer sessions simultaneously while preserving conversational history",
                    "It completely eliminates the need for data-privacy compliance steps",
                    "It automatically shifts financial compensation authority over to the customer"
                ],
                correct: 1
            }
        ]
    };

    // --- APPLICATION ENGINE ---
    function navigate(viewId) {
        // Manage active visual state across links
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        const targetLink = document.getElementById(`nav-${viewId}`);
        if(targetLink) targetLink.classList.add('active');

        const mainView = document.getElementById('main-view');
        
        if (viewId === 'theory') {
            mainView.innerHTML = `
                <div class="certification-card">
                    <h1>${DB.theory.title}</h1>
                    ${DB.theory.content}
                </div>
            `;
        } 
        else if (viewId === 'cases') {
            let html = `<div class="certification-card"><h1>Strategic Case Studies</h1>`;
            DB.cases.forEach(c => {
                html += `
                    <div class="case-wrapper">
                        <div class="case-header">${c.title}</div>
                        <div class="case-content"><strong>Strategic Challenge:</strong>${c.problem}</div>
                        <div class="case-solution"><strong>Executive Resolution:</strong>${c.solution}</div>
                    </div>
                `;
            });
            html += `</div>`;
            mainView.innerHTML = html;
        } 
        else if (viewId === 'drills') {
            let html = `<div class="certification-card"><h1>Operational Performance Drills</h1>`;
            DB.drills.forEach(d => {
                html += `
                    <div class="drill-block">
                        <div class="drill-header">${d.title}</div>
                        <div class="drill-body">
                            <p>${d.instruction}</p>
                            <textarea style="width:100%; height:120px; padding:15px; border-radius:4px; border:1px solid #cbd5e1; font-family:inherit; font-size:1rem;" placeholder="Type strategic resolution framework here..."></textarea>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            mainView.innerHTML = html;
        } 
        else if (viewId === 'exam') {
            let html = `
                <div class="certification-card">
                    <div class="exam-header">
                        <h1 style="color:white; margin-bottom:10px;">DAY 2 CERTIFICATION EXAM</h1>
                        <p>Advanced Omnichannel Strategy & Analytics Architecture</p>
                        <p><strong>Passing Criteria: 80% (8/10 Correct)</strong></p>
                    </div>
                    <form id="exam-form" onsubmit="evaluateExam(event)">
            `;

            DB.exam.forEach((q, idx) => {
                html += `
                    <div class="q-block">
                        <div class="q-scenario"><strong>Question ${idx + 1} of 10:</strong> ${q.scenario}</div>
                        <div class="options-container">
                `;
                q.options.forEach((opt, oIdx) => {
                    html += `
                        <label class="option-label">
                            <input type="radio" name="q${q.id}" value="${oIdx}" required>
                            ${opt}
                        </label>
                    `;
                });
                html += `
                        </div>
                    </div>
                `;
            });

            html += `
                        <div id="result-overlay"></div>
                        <button type="submit" class="btn-primary" id="btn-submit">Submit Certification Solutions</button>
                        <button type="button" class="btn-primary btn-retake" onclick="navigate('exam')" style="display:none;" id="btn-reset">Retake Examination</button>
                    </form>
                </div>
            `;
            mainView.innerHTML = html;
        }
    }

    function evaluateExam(event) {
        event.preventDefault();
        const form = document.getElementById('exam-form');
        const formData = new FormData(form);
        let score = 0;

        DB.exam.forEach(q => {
            const answer = formData.get(`q${q.id}`);
            if (parseInt(answer) === q.correct) {
                score++;
            }
        });

        const pct = (score / DB.exam.length) * 100;
        const overlay = document.getElementById('result-overlay');
        const submitBtn = document.getElementById('btn-submit');
        const resetBtn = document.getElementById('btn-reset');

        overlay.style.display = "block";
        window.scrollTo({ top: overlay.offsetTop + 200, behavior: 'smooth' });

        if (pct >= 80) {
            overlay.style.background = "#dcfce7";
            overlay.style.color = "#15803d";
            overlay.style.border = "2px solid #bbf7d0";
            overlay.innerHTML = `<h2>CERTIFICATION APPROVED</h2><p>You scored ${pct}% (${score}/10). You have demonstrated executive mastery of Day 2 core operational frameworks.</p>`;
            if (submitBtn) submitBtn.style.display = "none";
            if (resetBtn) resetBtn.style.display = "none";
        } else {
            overlay.style.background = "#fef2f2";
            overlay.style.color = "#991b1b";
            overlay.style.border = "2px solid #fecaca";
            overlay.innerHTML = `<h2>CERTIFICATION DENIED</h2><p>You scored ${pct}% (${score}/10). Review the Day 2 materials and attempt the examination again.</p>`;
            if (submitBtn) submitBtn.style.display = "none";
            if (resetBtn) resetBtn.style.display = "block";
        }
    }

    // Direct Boot Assignment
    window.onload = function() {
        navigate('theory');
    };
</script>

</body>
</html>
