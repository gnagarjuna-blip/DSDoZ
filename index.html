<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive CX Leadership Academy | Full Certification</title>
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc;
            --text: #1e293b; --white: #ffffff; --success: #059669;
            --danger: #e11d48; --gold: #d97706;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; }
        
        .sidebar { width: 320px; background: var(--primary); color: white; height: 100vh; position: fixed; }
        .sidebar-header { padding: 40px 30px; font-weight: 800; font-size: 1.5rem; border-bottom: 1px solid #334155; color: var(--accent); }
        .nav-item { padding: 20px 30px; cursor: pointer; transition: 0.3s; color: #94a3b8; font-weight: 600; border-left: 4px solid transparent; }
        .nav-item.active { background: #1e293b; color: white; border-left-color: var(--accent); }

        .main { margin-left: 320px; padding: 60px; width: 100%; max-width: 1100px; }
        .card { background: var(--white); padding: 50px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 10px solid var(--accent); margin-bottom: 50px; }
        
        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; }
        .theory-text { font-size: 1.1rem; line-height: 1.8; text-align: justify; margin: 30px 0; border-bottom: 1px solid #e2e8f0; padding-bottom: 30px; }

        .case-study-block { margin-bottom: 40px; background: #fffbeb; border-radius: 12px; overflow: hidden; border: 1px solid #fef3c7; }
        .case-header { background: var(--gold); color: white; padding: 15px 25px; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; }
        .case-body { padding: 25px; line-height: 1.7; }
        .solution-area { background: #f0fdf4; border-top: 2px solid #bbf7d0; padding: 25px; line-height: 1.7; }
        .sol-label { color: var(--success); font-weight: 800; display: block; margin-bottom: 10px; }

        .quiz-container { background: #f8fafc; padding: 40px; border-radius: 12px; border: 2px solid #e2e8f0; margin-top: 50px; }
        .q-scenario { background: #eff6ff; padding: 25px; border-radius: 8px; border-left: 5px solid var(--accent); margin-bottom: 15px; line-height: 1.6; font-size: 0.95rem; }
        .q-wrap { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .opt { display: block; padding: 15px; background: white; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f1f5f9; }
        .submit-btn { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">EXECUTIVE ACADEMY</div>
    <div class="nav-item active" onclick="loadPage(1)">DAY 1: Tone Calibration</div>
    <div class="nav-item" onclick="loadPage(2)">DAY 2: Ownership Strategy</div>
</div>

<div class="main" id="app"></div>

<script>
const content = {
    1: {
        title: "Day 1: Tone Calibration & Stoic Authority",
        theory: `Tone calibration is the systematic removal of emotional variance from professional communication. In high-level management, tone is used to neutralize customer aggression and project institutional stability. Theoretical research shows that excessive apologizing or emotional mirroring validates a customer's panic, signaling that the company is not in control. A "Stoic Anchor" tone uses clinical, precise, and adjective-free language to pull the conversation from the emotional brain to the logical brain. This level of calibration requires the total removal of "hedge words" (hopefully, maybe) and "weak subjects" (I think, I feel). By maintaining a flat-positive emotional baseline, the Manager acts as a professional North Star, ensuring that technical facts are prioritized over emotional narratives. This is not about being cold; it is about being a reliable authority who is too busy fixing the problem to participate in the drama.`,
        cases: [
            {
                p: `A Tier-1 Fintech client experienced a critical fund freeze during a global holiday, preventing millions in transactions for high-net-worth individuals. The customer called the Executive Lead, screaming profanities and threatening to move their entire $50M portfolio to a competitor immediately. The frontline staff had already sent multiple emails filled with "sincere apologies," which the customer perceived as a sign of weakness and lack of technical grasp. The situation was spiraling into a legal threat and a potential viral PR disaster, as the customer was currently typing a post for LinkedIn. The heat was at a 10/10, and the brand's security reputation was being questioned by the customer's legal counsel on a recorded line.`,
                s: `The Manager applied the "Stoic Anchor" protocol to reset the power dynamic. They interrupted the customer's shouting with a flat, low-decibel technical statement: "The ledger synchronization is currently at 85%; our protocol ensures full parity before release." They refused to acknowledge the personal insults or use any emotional adjectives. Instead, they provided 10-minute clinical updates using words like "Infrastructure Hardening" and "Parity Verification." By treating the global crisis as a routine technical procedure, they signaled that they were in total control. The customer, realizing their rage was having zero effect on the Manager's professional baseline, calmed down and apologized for their outburst. The $50M portfolio was retained without a single cent in concessions.`
            },
            {
                p: `A luxury fashion brand accidentally sent out a test notification to 2 million app users, containing internal placeholder text that was unprofessional and confusing. Thousands of customers began calling, fearing their accounts were hacked or that the brand's data security was compromised. The social media team was replying with emojis and "oops" messages, which made the older, high-spending demographic feel that the company was run by amateurs. The stock price was beginning to dip in early trading as "Security Breach" started trending on Twitter. The internal marketing team was panicking and wanted to send a long, 5-paragraph explanation about the intern who made the mistake.`,
                s: `The CX Manager vetoed the marketing narrative and enforced "Linguistic Hardening." They issued a single-sentence broadcast: "A system communication test was deployed; no user data was accessed or compromised." They directed the social team to stop using emojis and switch to a "Verified Status" tone. By removing the "story" about the intern and replacing it with a "System Test" framing, they turned a potential scandal into a boring administrative event. The stock price stabilized within two hours because the brand sounded like a secure institution rather than a chaotic startup. The Manager proved that in a crisis, a clinical tone is more comforting to investors and high-value clients than a human apology.`
            }
        ],
        quiz: [
            {
                scenario: `A B2B SaaS client is furious because a bug deleted their historical data for the last 48 hours. Your technical team tells you the data is unrecoverable. Your junior agent has already emailed the client saying, "I am so incredibly sorry for this terrible news, I feel awful about it." The client is now demanding to speak to someone "important" and is threatening a lawsuit for lost revenue. The emotional heat is high, and the client feels the agent is incompetent because of the "weak" tone.`,
                q: "As the Manager, which actions demonstrate proper Tone Calibration? (Select ALL correct)",
                options: [
                    {text: "Send a clinical update: 'Our internal audit confirms a 48-hour data gap; I am implementing the recovery credit protocol now.'", val: "a"},
                    {text: "Apologize even more than the agent to show you are more 'important' and care more.", val: "b"},
                    {text: "Ban the use of 'I feel' and 'Incredibly sorry' from all future comms on this ticket.", val: "c"},
                    {text: "Pivot to a solution: 'I have assigned a dedicated engineer to manually rebuild your primary fields to minimize business impact.'", val: "d"}
                ],
                correct: ["a", "c", "d"]
            },
            {
                scenario: `You are in a high-stakes board meeting. A board member calls your CX strategy "a waste of time and money" because churn hasn't dropped by 10% in one month. The room goes silent, waiting for your response. Your natural reaction is to get defensive or try to please the board member by promising unrealistic results. You must use Tone Calibration to maintain your executive authority.`,
                q: "Which responses align with the Stoic Anchor model? (Select ALL correct)",
                options: [
                    {text: "Ignore the emotional bait and state: 'The current data cycle shows a 2% stabilization; I will present the 90-day trajectory at the next session.'", val: "a"},
                    {text: "Argue that they don't understand how hard CX is.", val: "b"},
                    {text: "Maintain a neutral, flat-positive tone and ask: 'Which specific metric in the churn report is the primary concern for the Board?'", val: "c"},
                    {text: "Agree with them to avoid conflict and say you'll fire the agents.", val: "d"}
                ],
                correct: ["a", "c"]
            },
            {
                scenario: `A customer is using heavy sarcasm in an email, saying "Wow, great job guys! You really nailed it by breaking my account again." Your agent wants to respond sarcastically back or write a long, defensive explanation.`,
                q: "What is the calibrated managerial direction here? (Select ALL correct)",
                options: [
                    {text: "Instruct the agent to ignore the sarcasm entirely and respond only to the technical problem.", val: "a"},
                    {text: "Use 'Linguistic Stripping': Remove all emotional context and provide a bulleted list of current status.", val: "b"},
                    {text: "Tell the agent to say 'I am sorry you feel that way.'", val: "c"},
                    {text: "Use a Power Word: 'I have verified the account status and the correction is now finalized.'", val: "d"}
                ],
                correct: ["a", "b", "d"]
            },
            {
                scenario: `A viral post is mocking your brand's slow response time. The post has 50,000 likes. The Marketing team wants to reply with a funny meme to "join the conversation" and look cool.`,
                q: "What is the high-authority tone strategy? (Select ALL correct)",
                options: [
                    {text: "Veto the meme; humor during a service failure signals flippancy to the serious customers.", val: "a"},
                    {text: "Issue a boring, technical update on the service status instead.", val: "b"},
                    {text: "Allow the meme to get more likes.", val: "c"},
                    {text: "Maintain 'Institutional Distance'—not every tweet requires an emotional brand response.", val: "d"}
                ],
                correct: ["a", "b", "d"]
            },
            {
                scenario: `You are delivering bad news to a long-term client. The service they love is being discontinued. You know they will be upset.`,
                q: "How do you calibrate the delivery? (Select ALL correct)",
                options: [
                    {text: "Don't use 'Hopefully' or 'Maybe.' Use 'Our roadmap has evolved to [X].'", val: "a"},
                    {text: "Blame the engineering department for the change.", val: "b"},
                    {text: "Provide a 'prescriptive path': 'Your account will be migrated to the new system on [Date].'", val: "c"},
                    {text: "Focus on the 'Protocol' and 'Verified Benefits' of the new system.", val: "d"}
                ],
                correct: ["a", "c", "d"]
            }
        ]
    },
    2: {
        title: "Day 2: Ownership Strategy & Silo Destruction",
        theory: `Ownership logic is the managerial mandate of "Horizontal Accountability." It posits that internal departmental barriers are irrelevant to the customer experience. A CX Leader must act as a "Silo-Breaker," taking total end-to-end responsibility for an issue from the moment of contact until the moment of verified resolution. Theoretical studies on "Friction Logic" show that every time a customer is transferred to a different department, their trust in the brand drops by 15-20%. Therefore, the Manager's goal is "One-Touch" resolution—capturing the escalation and coordinating with Tech, Billing, or Logistics behind the scenes so the customer never feels the friction of the organization. This requires "Shadowing" tickets and exercising executive discretion to override internal policies that stall the customer's progress.`,
        cases: [
            {
                p: `A manufacturing giant was losing $50k an hour because a software glitch locked their automated production line. The Tech department claimed it was a "Server Issue" and told the CX Manager they couldn't look at it for 24 hours. The Billing department claimed the client's credit card had failed, causing a "Systemic Lockout." Both departments were pointing fingers at each other, and the customer was caught in the middle, calling every 5 minutes and threatening a $5M lawsuit for business interruption. The internal staff were telling the customer "It's not our department's fault," which was destroying the brand's professional image.`,
                s: `The CX Manager took "Extreme Ownership." They refused to transfer the customer again and gave them their direct mobile number. They pulled the heads of Tech and Billing into a mandatory "War Room" call and refused to end the call until a bypass was found. The Manager used their executive discretion to manually override the Billing lock, promising to "fight about the budget later." They then forced Tech to provide a manual API bridge to unlock the machines. By taking the "The Buck Stops Here" approach, the production line was back up in 4 hours instead of 24. The client was so impressed by the manager's personal accountability that they signed a 5-year contract extension the next day.`
            },
            {
                p: `A global medical logistics company lost a crate containing a donor organ meant for an immediate surgery. The warehouse said the "manifest was signed," while the courier claimed the "loading dock was empty." The hospital was in a state of emergency, and the CX agents were telling the hospital to "file a claim with the courier's insurance." The hospital board was preparing a public statement blaming the logistics company for a potential fatality. The friction was caused by a "Not My Job" mentality where everyone was following the standard operating procedure instead of the "Human Priority" of the situation.`,
                s: `The Manager bypassed all standard operating procedures. They stopped the hospital from calling anyone else and took "Sole Ownership" of the organ's location. They personally tracked the GPS of the last three delivery trucks and discovered the crate was accidentally left at a different hospital 5 miles away. The Manager drove their own car to the site, retrieved the organ, and hand-delivered it to the surgical team. They didn't wait for "Claims" or "Permissions." This "White-Glove" ownership transformed a potential tragedy and a $50M lawsuit into a national PR success story about the company's "Heroic Reliability."`
            }
        ],
        quiz: [
            {
                scenario: `A customer's refund for $10,000 has been 'pending' for 3 weeks. Billing says the bank is the problem. The Bank says Billing never sent the authorization. The customer is crying on the phone because they need that money for a house down-payment today. Your agent wants to tell the customer to 'call their bank again.'`,
                q: "Which actions demonstrate 'Silo-Breaking' Ownership? (Select ALL correct)",
                options: [
                    {text: "Tell the customer to call the bank one more time.", val: "a"},
                    {text: "Host a 3-way call between you, the customer, and the billing lead to verify the authorization live.", val: "b"},
                    {text: "Take ownership: 'I will manage the bank communication from here; you don't need to call anyone else.'", val: "c"},
                    {text: "If the bank continues to stall, ask the CFO for an 'Emergency Manual Disbursement' to the client.", val: "d"}
                ],
                correct: ["b", "c", "d"]
            },
            {
                scenario: `A software bug is affecting 50 enterprise clients. Engineering says the fix is 'Low Priority' and will take 1 month. You know these 50 clients represent 40% of your company's revenue.`,
                q: "As an 'Owner,' how do you handle this internal friction? (Select ALL correct)",
                options: [
                    {text: "Accept Engineering's timeline and apologize to the clients.", val: "a"},
                    {text: "Present the 'Revenue at Risk' data to the CTO to get the bug re-prioritized to 'Critical'.", val: "b"},
                    {text: "Create a manual 'Workaround Team' within CX to handle the clients' needs until the fix is live.", val: "c"},
                    {text: "Blame Engineering in your emails to the clients so they don't blame you.", val: "d"}
                ],
                correct: ["b", "c"]
            },
            {
                scenario: `A package was delivered to the wrong address because of a warehouse error. The warehouse refuses to send a new one until the old one is returned by the 'wrong' recipient. The customer is furious and wants a replacement NOW.`,
                q: "What is the 'Extreme Ownership' response? (Select ALL correct)",
                options: [
                    {text: "Tell the customer they have to wait for the return first.", val: "a"},
                    {text: "Override the warehouse and authorize an immediate 'Priority Replacement' at your department's cost.", val: "b"},
                    {text: "Personally coordinate with the courier to pick up the wrong package so the customer doesn't have to.", val: "c"},
                    {text: "Apologize and say 'The warehouse is really difficult to work with.'", val: "d"}
                ],
                correct: ["b", "c"]
            },
            {
                scenario: `An agent promised a customer a feature that doesn't exist. The customer bought the product based on that promise. Now they feel scammed.`,
                q: "How do you exercise 'Accountability' as a Manager? (Select ALL correct)",
                options: [
                    {text: "Tell the customer the agent was new and made a mistake, so no refund.", val: "a"},
                    {text: "Acknowledge the promise: 'We made a commitment during your onboarding that we must honor.'", val: "b"},
                    {text: "Offer a full refund or a custom technical bridge to simulate the feature for them.", val: "c"},
                    {text: "Fire the agent in front of the customer to show you care.", val: "d"}
                ],
                correct: ["b", "c"]
            },
            {
                scenario: `Your company is undergoing a merger. All systems are slow, and customers are experiencing 2-hour wait times. Your team is burnt out and 'checking out'.`,
                q: "What is the 'Managerial Ownership' action? (Select ALL correct)",
                options: [
                    {text: "Join the 'queue' yourself to show the team you are in the trenches with them.", val: "a"},
                    {text: "Implement a 'Triage Protocol' to solve high-impact issues in 5 minutes and defer the rest.", val: "b"},
                    {text: "Tell the team to just do their best and don't worry about the wait times.", val: "c"},
                    {text: "Communicate proactively to customers: 'We are in a transition phase; I have prioritized all urgent security files.'", val: "d"}
                ],
                correct: ["a", "b", "d"]
            }
        ]
    }
};

function loadPage(day) {
    const d = content[day];
    let html = `
        <h1>${d.title}</h1>
        <div class="theory-text"><strong>EXECUTIVE STRATEGY:</strong> ${d.theory}</div>
        
        <h2>High-Stakes Case Studies (10-Line Depth)</h2>
        ${d.cases.map((c, i) => `
            <div class="case-study-block">
                <div class="case-header">STRATEGIC CASE STUDY #${i+1}</div>
                <div class="case-body"><strong>THE PROBLEM:</strong> ${c.p}</div>
                <div class="solution-area">
                    <span class="sol-label">MANAGERIAL EXECUTION</span>
                    ${c.s}
                </div>
            </div>
        `).join('')}

        <div class="quiz-container">
            <h2>Day ${day} Certification Exam (All correct options must be selected)</h2>
            <div id="quiz-area">
                ${d.quiz.map((q, i) => `
                    <div class="q-wrap">
                        <div class="q-scenario">${q.scenario}</div>
                        <p><strong>Q${i+1}: ${q.q}</strong></p>
                        ${q.options.map(opt => `
                            <label class="opt">
                                <input type="checkbox" name="q${i}" value="${opt.val}"> ${opt.text}
                            </label>
                        `).join('')}
                    </div>
                `).join('')}
                <button class="submit-btn" onclick="checkQuiz(${day})">SUBMIT FINAL ASSESSMENT</button>
                <div id="score-result" style="margin-top:25px; font-weight:800; font-size:1.3rem;"></div>
            </div>
        </div>
    `;
    document.getElementById('app').innerHTML = html;
    document.querySelectorAll('.nav-item').forEach((item, idx) => {
        item.classList.toggle('active', idx + 1 === day);
    });
    window.scrollTo(0,0);
}

function checkQuiz(day) {
    const qData = content[day].quiz;
    let score = 0;
    qData.forEach((q, i) => {
        const checked = Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(el => el.value);
        const isCorrect = checked.length === q.correct.length && checked.every(v => q.correct.includes(v));
        if(isCorrect) score++;
    });
    const res = document.getElementById('score-result');
    if(score === qData.length) {
        res.innerHTML = `🏆 CERTIFIED: ${score}/${qData.length}. You have mastered Day ${day}.`;
        res.style.color = "var(--success)";
    } else {
        res.innerHTML = `❌ FAILED: ${score}/${qData.length}. Every correct option must be selected for every question.`;
        res.style.color = "var(--danger)";
    }
}

window.onload = () => loadPage(1);
</script>

</body>
</html>
