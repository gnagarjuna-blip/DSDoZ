<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Certification | Customer Experience Management</title>
    <style>
        :root {
            --alorica-red: #de2127; --navy: #0f172a; --slate: #1e293b;
            --ghost: #f8fafc; --gold: #b45309; --emerald: #059669; --crimson: #991b1b;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--ghost); color: var(--slate); margin: 0; line-height: 1.8;
            user-select: auto;
        }
        
        /* Layout Structure */
        .app-container { display: flex; min-height: 100vh; width: 100vw; overflow-x: hidden; }
        
        /* Professional Sidebar */
        .sidebar { 
            width: 350px; background: var(--navy); color: white; 
            padding: 40px 0; position: fixed; height: 100vh; z-index: 100;
        }
        .brand-logo { 
            padding: 0 30px 40px; font-size: 1.4rem; font-weight: 900; 
            letter-spacing: 1px; color: var(--alorica-red); border-bottom: 1px solid #334155;
        }
        .nav-group { margin-top: 30px; }
        .nav-link { 
            padding: 20px 30px; display: block; color: #94a3b8; text-decoration: none;
            font-weight: 600; transition: 0.3s; cursor: pointer; border-left: 5px solid transparent;
        }
        .nav-link:hover { background: #1e293b; color: white; }
        .nav-link.active { background: #1e293b; color: white; border-left-color: var(--alorica-red); }

        /* Main Content Area */
        .content-body { margin-left: 350px; padding: 80px 10%; width: calc(100% - 350px); }
        .certification-card { 
            background: white; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            padding: 60px; border-top: 8px solid var(--alorica-red); position: relative;
        }

        /* Typography */
        h1 { font-size: 2.8rem; color: var(--navy); margin-bottom: 40px; font-weight: 800; }
        h2 { font-size: 1.8rem; color: var(--navy); margin: 50px 0 20px; border-left: 6px solid var(--alorica-red); padding-left: 20px; }
        .exec-summary { font-size: 1.2rem; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
        
        /* Content Sections */
        .theory-section { text-align: justify; color: #334155; font-size: 1.1rem; }
        .theory-paragraph { margin-bottom: 30px; }

        .case-wrapper { margin: 60px 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .case-header { background: #f1f5f9; padding: 25px 40px; font-weight: 800; border-bottom: 1px solid #e2e8f0; color: var(--gold); }
        .case-content { padding: 40px; background: #fffcf5; }
        .case-solution { padding: 40px; background: #f0fdf4; border-top: 2px solid #dcfce7; }
        .p-space { margin-bottom: 20px; }

        .drill-block { background: #fff; border: 2px solid #cbd5e1; border-radius: 8px; margin-bottom: 40px; }
        .drill-header { background: var(--slate); color: white; padding: 20px 30px; font-weight: 700; }
        .drill-body { padding: 30px; }
        .drill-feedback { display: none; padding: 20px; margin-top: 20px; border-radius: 6px; background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }

        /* Hard Proctored Exam Components */
        .exam-secure-container { user-select: none !important; -webkit-user-select: none !important; }
        .exam-header { text-align: center; background: var(--navy); color: white; padding: 40px; margin: -60px -60px 60px; position: relative; }
        
        .proctor-badge { 
            background: #b91c1c; color: white; padding: 8px 16px; border-radius: 20px; 
            font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; 
            gap: 8px; margin-bottom: 15px; letter-spacing: 1px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .webcam-feed-simulation {
            position: absolute; top: 20px; right: 20px; width: 100px; height: 75px; 
            background: #000; border: 2px solid #b91c1c; border-radius: 4px; color: #0f0;
            font-family: monospace; font-size: 0.6rem; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; font-weight: bold;
        }
        .webcam-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; margin-bottom: 4px; animation: pulse 1s infinite; }

        .q-block { margin-bottom: 60px; padding: 40px; background: #f8fafc; border-radius: 12px; border: 2px solid #e2e8f0; }
        .q-scenario { color: var(--navy); margin-bottom: 25px; border-bottom: 2px solid #cbd5e1; padding-bottom: 20px; font-size: 1.05rem; font-weight: 600; text-align: justify; }
        .q-multi-alert { color: var(--gold); font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; display: block; }
        
        .option-label { 
            display: flex; align-items: flex-start; padding: 20px 25px; background: white; border: 2px solid #e2e8f0;
            border-radius: 8px; margin-top: 15px; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .option-label:hover { border-color: var(--alorica-red); background: #fef2f2; }
        .option-label input { margin-right: 20px; margin-top: 5px; transform: scale(1.3); }
        
        .btn-primary { 
            width: 100%; padding: 25px; background: var(--alorica-red); color: white; border: none;
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 40px;
        }
        .btn-gate { background: var(--gold); color: white; font-size: 1.3rem; margin-top: 30px; animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(180,83,9,0.4); } 50% { box-shadow: 0 0 25px rgba(180,83,9,0.8); } 100% { box-shadow: 0 0 5px rgba(180,83,9,0.4); } }
        .btn-retake { background: var(--navy); margin-top: 20px; }

        #result-overlay, .violation-overlay { 
            display: none; padding: 40px; border-radius: 12px; text-align: center; margin-top: 30px; font-weight: bold;
        }
        .violation-overlay { background: #fee2e2 !important; color: #991b1b !important; border: 3px dashed #ef4444 !important; display: none; }
        
        /* Fullscreen modifications */
        :-webkit-full-screen .certification-card { height: 100vh; overflow-y: scroll; padding: 40px; border-radius: 0; }
        :-moz-full-screen .certification-card { height: 100vh; overflow-y: scroll; padding: 40px; border-radius: 0; }
        :fullscreen .certification-card { height: 100vh; overflow-y: scroll; padding: 40px; border-radius: 0; }
    </style>
</head>
<body>

<div class="app-container" id="app-root">
    <aside class="sidebar" id="app-sidebar">
        <div class="brand-logo">ALORICA GLOBAL LEADERSHIP</div>
        <nav class="nav-group">
            <div class="nav-link active" id="nav-theory" onclick="navigate('theory')">Core Strategy & Theory</div>
            <div class="nav-link" id="nav-cases" onclick="navigate('cases')">Strategic Case Studies</div>
            <div class="nav-link" id="nav-drills" onclick="navigate('drills')">Operational Drills</div>
            <div class="nav-link" id="nav-exam" onclick="navigate('exam')">Certification Exam</div>
        </nav>
    </aside>

    <main class="content-body" id="main-view">
        </main>
</div>

<script>
    // --- DATABASE ---
    const DB = {
        theory: {
            title: "Advanced Omnichannel Orchestration & Predictive CX Analytics",
            content: `
                <div class="theory-section">
                    <div class="exec-summary">Architecting the Digital Experience Ecosystem</div>
                    <p class="theory-paragraph">In this phase of Customer Experience Management, the strategic focus pivots from single-touch service recovery models to the architectural integration of multidimensional touchpoints. In a world defined by transactional complexity, the modern Customer Experience Manager (CXM) must orchestrate an ecosystem where text, speech analytics, asynchronous messaging, and automated agents interact seamlessly. The metric of success has evolved from First Call Resolution (FCR) to Omnichannel Journey Continuity. Friction manifests when a consumer faces contextual amnesia—defined as the system's inability to retain transactional intent across channel migrations, forcing a repetitive validation loop.</p>
                    <p class="theory-paragraph">A critical tool under the modern CXM's purview is Real-Time Sentiment Analytics (RTSA). RTSA pipelines ingest acoustic, semantic, and metadata properties to assign dynamic effort ratings during live agent encounters. By tracking acoustic pitch fluctuations and conversational cross-talk patterns, the infrastructure triggers immediate supervisor alerts or algorithmic script augmentations. Moving beyond baseline quality assurance, this training focuses on utilizing predictive intent categorization to dynamically route customers before a voice channel escalation becomes necessary, driving down operational costs by capitalizing on lower-cost asynchronous messaging networks.</p>
                    <p class="theory-paragraph">Furthermore, we unpack the integration of Generative AI Copilots with core Customer Relationship Management (CRM) databases. The CXM must define the "Guardrail Parameters" that prevent machine-learned hallucination while maximizing conversational velocity. Implementing automated agent assistance allows frontline personnel to bypass manual Knowledge Base searches, shaving critical seconds off Average Handle Time (AHT) while ensuring a uniform brand perspective. We will evaluate how to navigate the technical divide between legacy database frameworks and cloud-native API abstractions to ensure real-time personal data surfaces securely at the point of customer engagement.</p>
                </div>
            `
        },
        cases: [
            {
                title: "CASE 01: The Fractured Omnichannel Migration Failure",
                problem: `<p class="p-space">A tier-one banking enterprise implemented an updated mobile application platform that accidentally locked out 50,000 legacy users due to an automated API validation error. When users migrated to web-based chat services to seek assistance, the system failed to pass their session tokens. This forced users to re-verify their identities across multiple security gates, resulting in a systemic bottleneck.</p><p class="p-space">Compounding the crisis, the automated interactive voice response (IVR) setup failed to recognize the influx of users attempting to bypass the broken digital platforms. The separation between the digital application support branch and the core voice telephony infrastructure resulted in conflicting messaging, long queues, and a 28-point drop in Net Promoter Score over a 48-hour period.</p>`,
                solution: `<p class="p-space">The CX Manager deployed an immediate emergency middleware update that extracted session metadata and automatically generated temporary authentication bypass keys for affected customers. Simultaneously, they implemented unified desktop interfaces for the agent workforce, which immediately displayed a customer's cross-channel pathway logs.</p><p class="p-space">By creating a centralized repository for cross-channel intent, agents were able to instantly bypass repetitive authentication requirements. This structural integration stabilized the cross-channel migration path, cut customer handle time by 45%, and completely eliminated the redundant verification friction that drove the original escalation wave.</p>`
            },
            {
                title: "CASE 02: Algorithmic Recovery and Sentiment Calibration",
                problem: `<p class="p-space">A high-volume global travel platform deployed an automated notification engine to inform passengers of flight cancellations during an extreme weather event. The automated notifications utilized cold, compliance-heavy language that triggered widespread panic. Customers swarmed both digital channels and social media profiles simultaneously.</p><p class="p-space">The internal customer support systems lacked conversational analytics capabilities to properly categorize callers based on panic levels or cancellation severity. As a result, standard premium flyers were left stuck in general assistance lines, while low-tier transactional users clogged high-priority emergency support paths, creating systemic service disruption.</p>`,
                solution: `<p class="p-space">The CX Manager intervened by implementing a real-time semantic analysis patch that scanned digital message patterns and incoming text for high-stress keywords. The platform automatically re-routed high-stress interactions directly to senior recovery agents equipped with immediate compensation authority.</p><p class="p-space">They also adjusted the automated outbound notification templates to mirror a proactive and supportive tone, offering direct links to self-service rebooking portals. This strategy successfully diverted 60% of the conversational volume away from standard voice lines while simultaneously protecting the high-value traveler segments.</p>`
            },
            {
                title: "CASE 03: The Asynchronous Scaling Dynamic",
                problem: `<p class="p-space">An international e-commerce conglomerate faced an unpredicted logistics block where delivery estimations for thousands of tech orders slipped by two weeks. Standard operations relied heavily on telephony channels, but agent capacity maxed out instantly. The average wait time soared past 90 minutes, driving high abandonment numbers.</p><p class="p-space">Because customers couldn't get updates, they double-ticketed across Facebook, email, and live chat, resulting in triplicate data loops. The operation faced an extreme risk of contract penalties due to missing target SLAs across all metrics.</p>`,
                solution: `<p class="p-space">The CXM immediately locked synchronous voice access for non-urgent tracking inquiries, changing the main interactive voice script to transfer users directly to an enriched WhatsApp/SMS asynchronous gateway via an automated link.</p><p class="p-space">Agents were upskilled onto multi-session dashboard interfaces, raising concurrency ratios from 1:1 voice calls to 1:4 active digital messaging slots. By organizing conversation logs by issue urgency instead of chronologically, the operation cleared the 3-day backup in 24 hours, stabilizing operational SLAs while decreasing handling costs.</p>`
            },
            {
                title: "CASE 04: The Legacy CRM Synch Breakdown",
                problem: `<p class="p-space">A healthcare provider launched a patient booking application that failed to synchronize records correctly with its 20-year-old on-premise relational database. Patients checking in for urgent appointments were told their reservations did not exist, leading to massive friction at physical clinic front desks.</p><p class="p-space">The front-desk operators, lacking authorization to manually add records without insurance pre-clearance codes, turned patients away. Frustrated customers overwhelmed the centralized telephone support lines, triggering long hold queues that impacted vulnerable populations seeking emergency advice.</p>`,
                solution: `<p class="p-space">The CX Manager set up a cross-functional triage team that established a real-time cloud data buffer layer. This buffer captured incoming application data independently and displayed it via an emergency standalone web module directly to both clinic desks and support agents.</p><p class="p-space">Desks were given temporary automated validation authorities that allowed them to confirm insurance coverage retrospectively. By removing the strict real-time requirement from the legacy database synchronization link, the patient validation bottleneck dropped from 40 minutes to under 60 seconds.</p>`
            },
            {
                title: "CASE 05: Generative AI Bot Hallucination Incident",
                problem: `<p class="p-space">An automated generative AI copilot deployed on a premium fashion retail portal began hallucinating policy details during a promotional flash sale. The bot informed roughly 12,000 shoppers that their clearance purchases were completely refundable and eligible for complementary overnight shipping, directly contradicting the company's clear final-sale rules.</p><p class="p-space">When order invoices dropped showing standard shipping costs and non-refundable statuses, buyers immediately accused the merchant of bait-and-switch tactics. This panic caused a major escalation wave across chat and corporate social profiles, threatening severe brand reputational harm.</p>`,
                solution: `<p class="p-space">The CXM immediately pulled the bot offline and applied rigid programmatic constraints, filtering all generative financial adjustments through a verified lookup table containing actual operational rule lists. For the impacted audience, the manager established an automated reconciliation workflow.</p><p class="p-space">Agents were given specialized layout tools to quickly issue partial store credits that neutralized the shipping cost disputes without honoring full, damaging merchandise returns. This clear, structural approach kept customer retention high while preserving the bottom-line budget.</p>`
            }
        ],
        drills: [
            { id: 1, title: "Drill 01: Multi-Channel Data Mapping Scenario", instruction: "Analyze a complex cross-channel log where a user moves from an automated chatbot to a live phone agent. Draft a clear context-handover summary that a live phone agent can review in under 5 seconds to eliminate customer repetition." },
            { id: 2, title: "Drill 02: AI Copilot Guardrail Structuring", instruction: "Draft a system prompt rulebook for a generative AI customer service agent handling billing discrepancies. Your guardrails must explicitly prevent the AI from offering unauthorized statement credits while maintaining an empathetic tone." },
            { id: 3, title: "Drill 03: Speech Analytics Alert Threshold Calibration", instruction: "Define the operational parameters for an automated real-time speech analytics filter. Specify the exact language patterns, tone indicators, and call conditions that should trigger an immediate live supervisor notification." },
            { id: 4, title: "Drill 04: Asynchronous Queue Prioritization Mapping", instruction: "Design a prioritization logic framework for an incoming asynchronous text queue containing 5,000 unread messages following an app crash. Categorize messages based on intent tags to maximize customer retention." },
            { id: 5, title: "Drill 05: Faux Resolution Root-Cause Analysis", instruction: "Review a data report showing a high digital channel closure rate coupled with an increase in repeat voice calls within 24 hours. Outline a targeted process modification to identify and eliminate this hidden customer friction point." }
        ],
        exam: [
            {
                id: 1,
                scenario: "A Tier-1 retail banking operation rolls out a core database update. Within hours, the token integration system fails to map active mobile sessions over to the web messaging software whenever a customer requests live chat escalations. Consequently, customers who authenticated inside the application are forced to re-verify their 16-digit profiles and re-explain their technical issues to live personnel. Given this context, which of the following root dynamics and engineering responses are accurate? (Select ALL that apply)",
                options: [
                    "The operational breakdown describes a critical gap in Omnichannel Journey Continuity known as Contextual Amnesia.",
                    "The failure implies that acoustic pitch fluctuations in the hardware caused cloud validation loops.",
                    "An immediate recovery requires deploying a dedicated middleware patch to parse session tokens securely across the API gateway.",
                    "The team should disable all digital entry-points and route 100% of live traffic into synchronous voice lines indefinitely."
                ],
                correct: [0, 2]
            },
            {
                id: 2,
                scenario: "A global travel platform experiences an unpredicted regional server lockout affecting 1.5 million active premium profiles. Real-time data telemetry indicates that Customer Effort Scores (CES) are spiking across digital channels, causing the live text queue to surge past 120 minutes. Simultaneously, empty synchronous voice queues remain active because the telephony routing has not been calibrated to handle sudden cross-channel diversions. Which strategic operational measures must the CX Manager authorize immediately? (Select ALL that apply)",
                options: [
                    "Broadcast immediate, systemic real-time notification banners outlining the system status inside the mobile application.",
                    "Increase individual agent target Average Handle Time (AHT) parameters to deliberately slow down text interaction velocities.",
                    "Dynamically re-allocate idle voice infrastructure agents to handle backlogged asynchronous messaging text queues.",
                    "Incorporate automated self-service routing trees that instantly link text inquiries to a localized network status tracking page."
                ],
                correct: [0, 2, 3]
            },
            {
                id: 3,
                scenario: "A management team integrates a generative AI chatbot helper to handle high-volume billing inquiries. During a baseline check, the generative engine encounters an ambiguous customer prompt and hallucinates, resulting in the bot promising an unauthorized $500 statement credit on a non-refundable entry-level utility subscription. What programmatic steps and guardrails must be codified into the AI platform's environment rules to protect the bottom-line budget? (Select ALL that apply)",
                options: [
                    "Enforce strict algorithmic data-validation guardrails that completely block the AI layer from changing financial fields directly.",
                    "Configure a hard system rule check that holds all credits above a $0 threshold for manual human supervisor validation.",
                    "Program the software to demand full multi-factor identity validation from the user before every single chat reply text block.",
                    "Deploy an automated programmatic lookup table that binds the generative engine's choices within pre-set structural parameters."
                ],
                correct: [0, 1, 3]
            },
            {
                id: 4,
                scenario: "A customer success manager identifies an ongoing operational anomaly where the digital self-service portal reports an exceptional 94% task completion score. However, centralized contact center statistics reveal a corresponding 32% spike in repeat voice call escalations within 48 hours for identical customer accounts. Which of the following statements correctly evaluate this scenario and outline strategic remedies? (Select ALL that apply)",
                options: [
                    "This trend presents a clear example of Faux Resolution Masking where tasks are closed on paper without addressing the root issue.",
                    "The data shows a positive realization of the Service Recovery Paradox that naturally increases baseline retention performance.",
                    "The operational group should analyze post-incident logs to discover where self-service applications are missing final validation gates.",
                    "The organization must adjust performance indicators to measure long-term resolution success rather than isolated text completions."
                ],
                correct: [0, 2, 3]
            },
            {
                id: 5,
                scenario: "An enterprise BPO operations center manages a multi-tier customer ecosystem utilizing three distinct outside fulfillment vendors: Vendor A handles incoming product inquiries, Vendor B manages regional billing records, and Vendor C supervises transit tracking operations. Following a major logistics delay, agents across all three separate fulfillment centers began transferring customers back and forth across different systems due to overlapping questions. To break this vendor bottleneck, what solutions should the CX structural architect enforce? (Select ALL that apply)",
                options: [
                    "Implement a unified cross-vendor workflow dashboard layer that enables any active agent to view the complete history of an issue.",
                    "Establish a centralized automated ticketing routing protocol that prevents manual phone hand-offs between agents.",
                    "Completely disable cross-company ticket records to force each separate vendor to work in complete isolation.",
                    "Deploy an integrated internal tracking setup that updates a single ticket in the background while keeping the customer with the first agent."
                ],
                correct: [0, 1, 3]
            },
            {
                id: 6,
                scenario: "A multinational telecom infrastructure is hit by a localized fiber cut during peak hours. Speech analytics algorithms flags a sudden 400% surge in customer calls utilizing vocabulary matched with severe anxiety or anger. The active floor teams are collapsing under stress, and traditional post-call quality evaluations are entirely inadequate for live mitigation. Which strategic actions should the director implement via their automated speech processing engines? (Select ALL that apply)",
                options: [
                    "Establish live cross-talk and volume alert metrics to flag high-stress interactions on supervisor management displays in real time.",
                    "Incorporate automated whisper-coaching scripts onto agent monitors to stream tactical system update bullet-points dynamically.",
                    "Instruct agents via an office-wide announcement to immediately hang up on any caller whose volume index crosses baseline values.",
                    "Set up an automated routing trigger to seamlessly transition highly escalated profiles directly to an advanced retention team."
                ],
                correct: [0, 1, 3]
            },
            {
                id: 7,
                scenario: "A high-end subscription entertainment network launches a new user interface. Call center volumes drop by 15%, causing management to celebrate. However, data analytics teams note an unexplained 8% loss in total paying users over the same period. Investigation shows that an automated, zero-touch cancellation button on the website allows instantaneous, friction-free profile removal. What strategic revisions should the CX leader execute? (Select ALL that apply)",
                options: [
                    "Incorporate a dynamic, value-focused retention step in the online portal cancellation pathway that offers custom alternatives based on user history.",
                    "Immediately disable all digital cancellation paths to force users into a specialized 90-minute telephone retention queue.",
                    "Deploy an automated, single-click asynchronous messaging invitation at the cancellation step to bridge to human retention staff.",
                    "Redesign key performance indexes to balance transactional handling speed with long-term account retention metrics."
                ],
                correct: [0, 2, 3]
            },
            {
                id: 8,
                scenario: "A digital meal delivery service suffers a regional database freeze on a Friday night, trapping thousands of active orders in an incomplete state. App users, encountering an unresponsive in-app chat widget, begin creating viral public threads across major social media networks. The brand is trending negatively online within minutes. Which coordinated actions must the emergency command group take? (Select ALL that apply)",
                options: [
                    "Publish an official, pinned message explaining the system issue transparently across public profiles while confirming personal data remains secure.",
                    "Instruct the automated system to deploy boilerplate legal disclaimers requesting users to take down negative statements.",
                    "Route incoming social direct messages through an automated semantic filter to prioritize accounts with stuck transactions.",
                    "Empower social triage agents with authorized compensation credits to immediately resolve issues for impacted users."

                id: 9,
                scenario: "A luxury automotive service introduces a strict biometric multi-factor authentication security layer at physical rental counters to reduce asset losses. High-profile corporate VIP travelers, who expect rapid service, find themselves stuck waiting in lines for backend database approvals. What adjustments solve this experience friction without violating company security compliance? (Select ALL that apply)",
                options: [
                    "Re-engineer the identity framework to allow VIP clients to execute the secure biometric registration within their mobile application prior to arrival.",

                    "Downgrade overall network firewall rules during high-volume airport arrival hours to bypass validation delays entirely."
                ],

            {

                options: [
                    "The group must transition from tracking strict 1:1 agent handling queues to measuring multi-session concurrency ratios.",
                    "The business must recognize that asynchronous text options completely remove any requirement to follow strict data privacy regulations.",

            }
        ]
    };

    // --- APPLICATION ENGINE ---
    let examViolated = false;
    let examActive = false;

    function navigate(viewId) {
        if (viewId !== 'exam') {
            detachExamSecurity();
        }

        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        const targetLink = document.getElementById(`nav-${viewId}`);
        if(targetLink) targetLink.classList.add('active');

        const mainView = document.getElementById('main-view');
        
        if (viewId === 'theory') {
            mainView.innerHTML = `
                <div class="certification-card">
                    <h1>${DB.theory.title}</h1>
                    ${DB.theory.content}
                </div>
            `;
        } 
        else if (viewId === 'cases') {
            let html = `<div class="certification-card"><h1>Strategic Case Studies</h1>`;
            DB.cases.forEach(c => {
                html += `
                    <div class="case-wrapper">
                        <div class="case-header">${c.title}</div>
                        <div class="case-content"><strong>Strategic Challenge:</strong>${c.problem}</div>
                        <div class="case-solution"><strong>Executive Resolution:</strong>${c.solution}</div>
                    </div>
                `;
            });
            html += `</div>`;
            mainView.innerHTML = html;
        } 
        else if (viewId === 'drills') {
            let html = `<div class="certification-card"><h1>Operational Performance Drills</h1>`;
            DB.drills.forEach(d => {
                html += `
                    <div class="drill-block">
                        <div class="drill-header">${d.title}</div>
                        <div class="drill-body">
                            <p>${d.instruction}</p>
                            <textarea id="drill-text-${d.id}" style="width:100%; height:120px; padding:15px; border-radius:4px; border:1px solid #cbd5e1; font-family:inherit; font-size:1rem;" placeholder="Type strategic resolution framework here..."></textarea>
                            <div id="drill-feedback-${d.id}" class="drill-feedback"></div>
                            <button type="button" class="btn-primary" style="padding:12px; margin-top:15px; font-size:1rem; width:auto;" onclick="submitDrill(${d.id})">Submit Operational Drill</button>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            mainView.innerHTML = html;
        } 
        else if (viewId === 'exam') {
            examViolated = false;
            examActive = false;
            
            // Proctored Entry Gate
            mainView.innerHTML = `
                <div class="certification-card exam-secure-container" id="secure-card" style="text-align:center; padding:80px 40px;">
                    <div class="proctor-badge" style="font-size:1rem; padding:12px 24px;"><span style="width:10px; height:10px; background:#fff; border-radius:50%; display:inline-block;"></span> SECURE GATEWAY ENABLED</div>
                    <h1 style="margin-top:20px;">PROCTORED CERTIFICATION INTERFACE</h1>
                    <p style="max-width:600px; margin: 20px auto; font-size:1.1rem; color:#475569;">
                        This exam enforces enterprise-level anti-cheat controls. Entering the examination requires **mandatory browser full-screen containment** alongside continuous simulated proctor telemetry.
                    </p>
                    <div style="background:#f1f5f9; padding:25px; border-radius:8px; max-width:600px; margin:30px auto; text-align:left; border-left:4px solid var(--alorica-red);">
                        <strong>Proctoring Rules & Policy:</strong>
                        <ul style="margin:10px 0 0 20px; padding:0;">
                            <li>Exiting full-screen mode instantly cancels and fails the exam session.</li>
                            <li>Right-clicks, text selections, and copying keyboard shortcuts are fully locked.</li>
                            <li>Mobile device input mirroring or screenshot triggers will lock the evaluation layout.</li>
                        </ul>
                    </div>
                    <button type="button" class="btn-primary btn-gate" style="max-width:400px;" onclick="requestExamActivation()">Launch Proctored Exam Mode</button>
                </div>
            `;
        }
    }

    function requestExamActivation() {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) { docEl.requestFullscreen(); }
        else if (docEl.mozRequestFullScreen) { docEl.mozRequestFullScreen(); }
        else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen(); }
        else if (docEl.msRequestFullscreen) { docEl.msRequestFullscreen(); }
        
        buildExamForm();
    }

    function buildExamForm() {
        examActive = true;
        const mainView = document.getElementById('main-view');
        
        let html = `
            <div class="certification-card exam-secure-container" id="secure-card">
                <div class="exam-header">
                    <div class="proctor-badge"><span style="width:8px; height:8px; background:#fff; border-radius:50%; display:inline-block;"></span> SECURE AI PROCTORING ACTIVE</div>
                    <div class="webcam-feed-simulation">
                        <div class="webcam-dot"></div>
                        WEBCAM LIVE<br><span id="cam-coords" style="color:#0af; font-size:0.5rem;">REC...</span>
                    </div>
                    <h1 style="color:white; margin-bottom:10px; font-size:2.2rem;">EXECUTIVE CERTIFICATION EXAM</h1>
                    <p style="margin:5px 0;">Advanced Omnichannel Strategy & Analytics Architecture</p>
                    <p style="color:var(--gold); font-weight:bold; margin:5px 0;">CRITICAL STATUS: MULTIPLE ANSWER QUESTIONS - SELECT ALL CORRECT OPTIONS</p>
                    <p><strong>Passing Criteria: 100% Absolute Mastery Required (10/10 Correct)</strong></p>
                </div>
                
                <div id="violation-msg" class="violation-overlay"></div>

                <form id="exam-form" onsubmit="evaluateExam(event)">
        `;

        // Iterating through all 10 items in the database array cleanly
        DB.exam.forEach((q, idx) => {
            html += `
                <div class="q-block">
                    <div class="q-scenario"><strong>Scenario ${idx + 1}:</strong> ${q.scenario}</div>
                    <span class="q-multi-alert">Select all answers that apply to this operational architecture:</span>
                    <div class="options-container">
            `;
            q.options.forEach((opt, oIdx) => {
                html += `
                    <label class="option-label">
                        <input type="checkbox" name="q${q.id}" value="${oIdx}">
                        <span>${opt}</span>
                    </label>
                `;
            });
            html += `
                    </div>
                </div>
            `;
        });

        html += `
                    <div id="result-overlay"></div>
                    <button type="submit" class="btn-primary" id="btn-submit">Submit Solutions for Verification</button>
                    <button type="button" class="btn-primary btn-retake" onclick="navigate('exam')" style="display:none;" id="btn-reset">Restart Secure Examination</button>
                </form>
            </div>
        `;
        
        mainView.innerHTML = html;
        attachExamSecurity();
    }

    function submitDrill(drillId) {
        const textValue = document.getElementById(`drill-text-${drillId}`).value.trim();
        const feedbackDiv = document.getElementById(`drill-feedback-${drillId}`);
        
        if (!textValue) {
            alert("Please type your response framework before submitting.");
            return;
        }
        
        feedbackDiv.style.display = "block";
        feedbackDiv.innerHTML = `<strong>Operational Assessment Confirmed:</strong> Response log accepted into training repository.`;
    }

    // --- SECURE EXAM ENGINE & MONITORING ---
    function attachExamSecurity() {
        const secureCard = document.getElementById('secure-card');
        if(!secureCard) return;

        secureCard.addEventListener('contextmenu', preventDefaultAction);
        secureCard.addEventListener('copy', preventDefaultAction);
        secureCard.addEventListener('cut', preventDefaultAction);
        secureCard.addEventListener('paste', preventDefaultAction);
        window.addEventListener('keydown', handleKeyRestrictions);
        
        window.examCamInterval = setInterval(() => {
            const coords = document.getElementById('cam-coords');
            if(coords) {
                coords.innerText = `X:${Math.floor(Math.random()*40+10)} Y:${Math.floor(Math.random()*40+50)} V_FPS:30`;
            }
        }, 1200);

        document.addEventListener('visibilitychange', handleVisibilityViolation);
        
        document.addEventListener('fullscreenchange', checkFullscreenViolation);
        document.addEventListener('webkitfullscreenchange', checkFullscreenViolation);
        document.addEventListener('mozfullscreenchange', checkFullscreenViolation);
        document.addEventListener('MSFullscreenChange', checkFullscreenViolation);
    }

    function detachExamSecurity() {
        document.removeEventListener('visibilitychange', handleVisibilityViolation);
        document.removeEventListener('fullscreenchange', checkFullscreenViolation);
        document.removeEventListener('webkitfullscreenchange', checkFullscreenViolation);
        document.removeEventListener('mozfullscreenchange', checkFullscreenViolation);
        document.removeEventListener('MSFullscreenChange', checkFullscreenViolation);
        window.removeEventListener('keydown', handleKeyRestrictions);
        clearInterval(window.examCamInterval);
        
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        }
    }

    function preventDefaultAction(e) {
        e.preventDefault();
        triggerViolation("Unauthorized Clipboard action, Copying, or Right-Click Context Menu detected.");
    }

    function handleKeyRestrictions(e) {
        if (e.ctrlKey && ['c', 'v', 'x', 'p', 's'].includes(e.key.toLowerCase())) {
            e.preventDefault();
            triggerViolation("Keyboard shortcut security exception triggered.");
        }
        if (e.key === 'PrintScreen') {
            e.preventDefault();
            triggerViolation("Hardware PrintScreen capture framework intercepted.");
        }
    }

    function handleVisibilityViolation() {
        if (document.hidden && examActive) {
            triggerViolation("Window focus change or screenshot utility workspace swap detected.");
        }
    }

    function checkFullscreenViolation() {
        if (examActive && !document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
            triggerViolation("Full-Screen containment environment breached.");
        }
    }

    function triggerViolation(reason) {
        if (examViolated) return;
        examViolated = true;
        examActive = false;
        
        const form = document.getElementById('exam-form');
        const violationMsg = document.getElementById('violation-msg');
        const submitBtn = document.getElementById('btn-submit');
        const resetBtn = document.getElementById('btn-reset');
        const secureCard = document.getElementById('secure-card');

        if(secureCard) secureCard.style.filter = "blur(5px)";
        setTimeout(() => { if(secureCard) secureCard.style.filter = "none"; }, 400);

        if(form) form.style.display = "none";
        if(violationMsg) {
            violationMsg.style.display = "block";
            violationMsg.innerHTML = `
                <h2>EXAM CANCELLED & LOCKED</h2>
                <p><strong>Security Violation Reason:</strong> ${reason}</p>
                <p>Your proctoring ecosystem recorded an environment modification (exiting full screen, screen shifting, or alternate shortcut translation). The evaluation has been cancelled to preserve test safety parameters.</p>
            `;
        }
        if (submitBtn) submitBtn.style.display = "none";
        if (resetBtn) resetBtn.style.display = "block";
    }

    function evaluateExam(event) {
        event.preventDefault();
        if(examViolated) return;

        let totalQuestions = DB.exam.length;
        let score = 0;

        DB.exam.forEach(q => {
            const checkedBoxes = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
            const userAnswers = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            const matchesAllCorrect = q.correct.every(val => userAnswers.includes(val));
            const matchesLength = q.correct.length === userAnswers.length;

            if (matchesAllCorrect && matchesLength) {
                score++;
            }
        });

        const pct = (score / totalQuestions) * 100;
        const overlay = document.getElementById('result-overlay');
        const submitBtn = document.getElementById('btn-submit');
        const resetBtn = document.getElementById('btn-reset');

        overlay.style.display = "block";
        window.scrollTo({ top: overlay.offsetTop + 200, behavior: 'smooth' });

        if (pct === 100) {
            overlay.style.background = "#dcfce7";
            overlay.style.color = "#15803d";
            overlay.style.border = "2px solid #bbf7d0";
            overlay.innerHTML = `<h2>CERTIFICATION APPROVED</h2><p>You achieved 100% (${score}/${totalQuestions}). Perfect evaluation record. You have demonstrated absolute command over advanced omnichannel architecture parameters.</p>`;
            if (submitBtn) submitBtn.style.display = "none";
            if (resetBtn) resetBtn.style.display = "none";
            examActive = false;
        } else {
            overlay.style.background = "#fef2f2";
            overlay.style.color = "#991b1b";
            overlay.style.border = "2px solid #fecaca";
            overlay.innerHTML = `<h2>CERTIFICATION DENIED</h2><p>You scored ${pct.toFixed(0)}% (${score}/${totalQuestions} correct). Multi-answer questions require picking ALL strategic selections cleanly. Review system details and try again.</p>`;
            if (submitBtn) submitBtn.style.display = "none";
            if (resetBtn) resetBtn.style.display = "block";
        }
    }

    window.onload = function() {
        navigate('theory');
    };
</script>
