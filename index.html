<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive CX Training | Scenario-Based Certification</title>
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc;
            --text: #1e293b; --white: #ffffff; --success: #059669;
            --danger: #e11d48; --gold: #d97706;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; }
        
        /* Navigation */
        .sidebar { width: 320px; background: var(--primary); color: white; height: 100vh; position: fixed; }
        .sidebar-header { padding: 40px 30px; font-weight: 800; font-size: 1.5rem; border-bottom: 1px solid #334155; color: var(--accent); }
        .nav-item { padding: 20px 30px; cursor: pointer; transition: 0.3s; color: #94a3b8; font-weight: 600; border-left: 4px solid transparent; }
        .nav-item.active { background: #1e293b; color: white; border-left-color: var(--accent); }

        /* Main Content */
        .main { margin-left: 320px; padding: 60px; width: 100%; max-width: 1100px; }
        .card { background: var(--white); padding: 50px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 10px solid var(--accent); margin-bottom: 50px; }
        
        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 30px; }
        .theory-text { font-size: 1.1rem; line-height: 1.8; text-align: justify; margin-bottom: 40px; border-bottom: 1px solid #e2e8f0; padding-bottom: 30px; }

        /* Case Study Block */
        .case-study-block { margin-bottom: 40px; background: #fffbeb; border-radius: 12px; overflow: hidden; border: 1px solid #fef3c7; }
        .case-header { background: var(--gold); color: white; padding: 15px 25px; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; }
        .case-body { padding: 25px; line-height: 1.7; }
        .solution-area { background: #f0fdf4; border-top: 2px solid #bbf7d0; padding: 25px; line-height: 1.7; }
        .sol-label { color: var(--success); font-weight: 800; display: block; margin-bottom: 10px; }

        /* Quiz UI */
        .quiz-container { background: #f8fafc; padding: 40px; border-radius: 12px; border: 2px solid #e2e8f0; }
        .q-scenario { background: #eff6ff; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); margin-bottom: 15px; font-style: italic; line-height: 1.6; }
        .q-wrap { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .opt { display: block; padding: 15px; background: white; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .opt:has(input:checked) { border-color: var(--accent); background: #eff6ff; }
        .submit-btn { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        .multi-tag { color: var(--accent); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">CX LEADERSHIP</div>
    <div class="nav-item active" onclick="loadPage(1)">Day 1: Tone Calibration</div>
    <div class="nav-item" onclick="loadPage(2)">Day 2: Ownership Logic</div>
</div>

<div class="main" id="app">
    </div>

<script>
const content = {
    1: {
        title: "Day 1: Advanced Tone Calibration & Stoic Authority",
        theory: "Tone calibration is the strategic application of linguistic neutrality to manage high-stakes customer volatility. In executive CX, tone is not a reflection of personality but a calculated instrument for de-escalation. Theoretical frameworks suggest that emotional mirroring—where a manager matches a customer's heat or excessive apology—actually validates the customer's perceived loss of control. By contrast, a 'Stoic Anchor' tone uses flat, clinical, and precise language to project that the organization is stable, regardless of the failure. This requires the total removal of hedge words, emotional adjectives, and defensive justifications. Calibration ensures that the Manager remains the 'Professional North' for both the team and the client, using somatic pacing and written structure to pull the conversation from the emotional amygdala back to the logical prefrontal cortex for technical resolution.",
        cases: [
            {
                p: "A Tier-1 Fintech client experienced a fund freeze during a global holiday, preventing millions in transactions. The customer called the Manager, screaming profanities and threatening to sue for damages. The frontline had already apologized 50 times, which only made the customer angrier as they felt the company was admitting legal fault without offering a fix. The customer was seeking a human to attack, and the apologetic tone was acting as fuel for their rage. The 'heat' of the situation was at a 10/10, risking immediate contract termination and a massive public PR disaster for the bank's security reputation. This emotional spiral was feeding off the staff's visible panic and repetitive excuses about the holiday schedule, which the customer perceived as a sign of institutional incompetence.",
                s: "The Manager applied the 'Stoic Anchor' protocol immediately to cut the emotional feedback loop. They interrupted the customer's yelling with a flat, low-decibel technical update: 'The ledger synchronization is currently at 85%.' They refused to acknowledge the insults or apologize for the 'feelings.' Instead, they provided 10-minute interval updates using clinical language like 'Infrastructure Hardening' and 'Protocol Reset.' By treating the situation as a routine technical procedure rather than a crisis, they forced the customer to match their logical tone. This approach de-personalized the conflict, moving the discussion from 'blame' to 'status.' Within 40 minutes, the customer calmed down, apologized for their behavior, and the contract was saved without any financial concessions."
            }
        ],
        quiz: [
            {
                scenario: "A high-profile enterprise client is emailing you frantically because their service has been down for 4 hours during their peak sales window. Your technical team just informed you that the fix will take another 2 hours. Your junior agent has already sent three emails saying 'We are so sorry for the terrible inconvenience' and 'We hope to be back soon.' The client is now threatening to post the email thread on LinkedIn to show how 'unprofessional' your team is. You need to intervene and reset the authority of the conversation.",
                q: "Which actions represent correct Tone Calibration in this scenario? (Select ALL that apply)",
                options: [
                    {text: "Immediately send a detailed apology explaining that the tech team is working hard and 'hopes' for a faster resolution.", val: "a"},
                    {text: "Issue a clinical update: 'The system is in the final phase of a scheduled protocol recovery; ETA 120 minutes.'", val: "b"},
                    {text: "Audit the previous thread and instruct the agent to stop using emotional adjectives like 'terrible' or 'inconvenient'.", val: "c"},
                    {text: "Acknowledge the business impact by saying: 'I have noted the sales window impact and have prioritized this file for a post-recovery audit.'", val: "d"}
                ],
                correct: ["b", "c", "d"]
            },
            {
                scenario: "During a live video call with a frustrated Board of Directors, a technical bug causes your presentation to crash. One of the Board members mocks the software's reliability in front of the entire group. Your natural instinct is to laugh awkwardly or apologize profusely to ease the tension. However, as an Executive CX Manager, you must maintain 'Institutional Authority' to ensure they don't lose confidence in the product's long-term roadmap.",
                q: "How should you linguistically handle this mockery using Stoic Anchor principles? (Select ALL that apply)",
                options: [
                    {text: "Ignore the mockery entirely and state: 'I am re-establishing the secure connection now; please hold for the data refresh.'", val: "a"},
                    {text: "Make a joke about the tech team to show you are on the Board's side.", val: "b"},
                    {text: "Maintain a flat, neutral facial expression and voice, treating the crash as a minor data-point rather than a failure.", val: "c"},
                    {text: "Apologize and promise that the person responsible for the bug will be reprimanded.", val: "d"}
                ],
                correct: ["a", "c"]
            }
        ]
    },
    2: {
        title: "Day 2: Ownership Strategy & Friction Logic",
        theory: "Ownership logic is the managerial discipline of 'Horizontal Accountability.' It posits that the person who first touches a customer escalation becomes the ultimate guardian of that customer's loyalty, regardless of which department caused the error. In fractured organizations, 'The Silo Effect' causes customers to be bounced between billing, tech, and shipping, with each transfer reducing brand trust by 15-20%. A CX Lead must operate as a 'Silo-Breaker,' taking total end-to-end responsibility. This involves 'Shadowing'—where you don't just ask for an update, you follow the ticket through the backend to ensure it doesn't stall. The theory of 'One-Touch' resolution asserts that a manager should never transfer a customer back into a general queue; the manager remains the single, unshakeable point of contact until the customer confirms in writing that the issue is resolved.",
        cases: [
            {
                p: "A manufacturing client was losing $50k an hour because a software update locked their production line. The Tech department said it was a 'Server Issue' and told the CX Manager to wait 24 hours. The Billing department said the client's 'Subscription' had expired during the update, causing a lock. Both departments were pointing fingers at each other while the client was calling every 5 minutes, threatening a multi-million dollar lawsuit. The client was being told 'It's not our department' by every agent they spoke to, leading to a complete breakdown in institutional trust and a demand for the CEO's personal phone number. The friction was at a breaking point because the internal silos were more interested in protecting their own KPIs than saving the client's operation.",
                s: "The CX Manager took 'Horizontal Ownership' and became the single point of contact. They refused to let the customer be transferred again. They pulled the heads of Tech and Billing into a single Slack war-room and stayed there for 6 hours. The Manager told Tech: 'I don't care if it's a server issue, give me a manual bypass code.' They told Billing: 'Override the expiration, I will take the financial hit on my department's budget.' By taking the 'The Buck Stops Here' approach, they got the client's machines moving in 6 hours instead of 24. The Manager personally updated the client every 30 minutes, even when there was no news, to demonstrate active oversight. The client was so impressed by the manager's 'Silo-Breaking' that they upgraded their contract the following month."
            }
        ],
        quiz: [
            {
                scenario: "A high-value customer's shipment has been lost for 10 days. Shipping says it's a courier issue. The Courier says they never received the manifest from your Warehouse. Billing has already charged the customer and refuses to refund until the 'investigation' is over in 14 days. The customer is now screaming at your frontline agent, calling the company a 'scam' and threatening to contact the Better Business Bureau. You are the manager called to the floor.",
                q: "What actions demonstrate 'Extreme Ownership' and 'Silo-Breaking'? (Select ALL that apply)",
                options: [
                    {text: "Tell the customer that you have initiated a cross-departmental war-room to locate the item personally.", val: "a"},
                    {text: "Explain to the customer that Billing has a strict policy and you cannot override it.", val: "b"},
                    {text: "Provide your direct contact info and promise to be the *only* person they need to speak with until resolution.", val: "c"},
                    {text: "Authorize an immediate manual refund or replacement from your own department budget, then fight with Billing/Warehouse internally afterward.", val: "d"}
                ],
                correct: ["a", "c", "d"]
            }
        ]
    }
};

function loadPage(day) {
    const d = content[day];
    let html = `
        <h1>${d.title}</h1>
        <div class="theory-text"><strong>EXECUTIVE THEORY:</strong> ${d.theory}</div>
        
        <h2>Strategic Case Study Analysis</h2>
        ${d.cases.map((c, i) => `
            <div class="case-study-block">
                <div class="case-header">MANAGEMENT CASE #${i+1}</div>
                <div class="case-body"><strong>SCENARIO:</strong> ${c.p}</div>
                <div class="solution-area">
                    <span class="sol-label">EXECUTIVE SOLUTION</span>
                    ${c.s}
                </div>
            </div>
        `).join('')}

        <div class="quiz-container">
            <h2>Day ${day} Certification Exam <span class="multi-tag">(MULTI-ANSWER)</span></h2>
            <div id="quiz-area">
                ${d.quiz.map((q, i) => `
                    <div class="q-wrap" id="q-block-${i}">
                        <div class="q-scenario">${q.scenario}</div>
                        <p><strong>Question ${i+1}: ${q.q}</strong></p>
                        ${q.options.map(opt => `
                            <label class="opt">
                                <input type="checkbox" name="q${i}" value="${opt.val}"> ${opt.text}
                            </label>
                        `).join('')}
                    </div>
                `).join('')}
                <button class="submit-btn" onclick="checkQuiz(${day})">VALIDATE CERTIFICATION</button>
                <div id="score-result" style="margin-top:20px; font-weight:bold; font-size:1.2rem;"></div>
            </div>
        </div>
    `;
    document.getElementById('app').innerHTML = html;
    document.querySelectorAll('.nav-item').forEach((item, idx) => {
        item.classList.toggle('active', idx + 1 === day);
    });
    window.scrollTo(0,0);
}

function checkQuiz(day) {
    const qData = content[day].quiz;
    let totalCorrectQuestions = 0;

    qData.forEach((q, i) => {
        const checked = Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(el => el.value);
        
        // Check if checked matches exactly the correct array
        const isCorrect = checked.length === q.correct.length && 
                          checked.every(v => q.correct.includes(v));
        
        if(isCorrect) totalCorrectQuestions++;
    });

    const res = document.getElementById('score-result');
    const scorePercent = (totalCorrectQuestions / qData.length) * 100;

    if(scorePercent === 100) {
        res.innerHTML = `🏆 PERFECT: ${totalCorrectQuestions}/${qData.length}. Day ${day} Mastery Confirmed.`;
        res.style.color = "var(--success)";
    } else {
        res.innerHTML = `⚠️ SCORE: ${totalCorrectQuestions}/${qData.length}. All correct options must be selected to pass a question.`;
        res.style.color = "var(--danger)";
    }
}

window.onload = () => loadPage(1);
</script>

</body>
</html>
