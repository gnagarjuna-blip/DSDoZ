<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Certification | Customer Experience Management</title>
    <style>
        :root {
            --alorica-red: #de2127; --navy: #0f172a; --slate: #1e293b;
            --ghost: #f8fafc; --gold: #b45309; --emerald: #059669;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--ghost); color: var(--slate); margin: 0; line-height: 1.8;
        }
        
        /* Layout Structure */
        .app-container { display: flex; min-height: 100vh; width: 100vw; overflow-x: hidden; }
        
        /* Professional Sidebar */
        .sidebar { 
            width: 350px; background: var(--navy); color: white; 
            padding: 40px 0; position: fixed; height: 100vh; z-index: 100;
        }
        .brand-logo { 
            padding: 0 30px 40px; font-size: 1.4rem; font-weight: 900; 
            letter-spacing: 1px; color: var(--alorica-red); border-bottom: 1px solid #334155;
        }
        .nav-group { margin-top: 30px; }
        .nav-link { 
            padding: 20px 30px; display: block; color: #94a3b8; text-decoration: none;
            font-weight: 600; transition: 0.3s; cursor: pointer; border-left: 5px solid transparent;
        }
        .nav-link:hover { background: #1e293b; color: white; }
        .nav-link.active { background: #1e293b; color: white; border-left-color: var(--alorica-red); }

        /* Main Content Area */
        .content-body { margin-left: 350px; padding: 80px 10%; width: calc(100% - 350px); }
        .certification-card { 
            background: white; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            padding: 60px; border-top: 8px solid var(--alorica-red);
        }

        /* Typography */
        h1 { font-size: 2.8rem; color: var(--navy); margin-bottom: 40px; font-weight: 800; }
        h2 { font-size: 1.8rem; color: var(--navy); margin: 50px 0 20px; border-left: 6px solid var(--alorica-red); padding-left: 20px; }
        .exec-summary { font-size: 1.2rem; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
        
        /* High-Depth Content */
        .theory-section { text-align: justify; color: #334155; font-size: 1.1rem; }
        .theory-paragraph { margin-bottom: 30px; }

        /* Multi-Paragraph Case Studies */
        .case-wrapper { margin: 60px 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .case-header { background: #f1f5f9; padding: 25px 40px; font-weight: 800; border-bottom: 1px solid #e2e8f0; color: var(--gold); }
        .case-content { padding: 40px; background: #fffcf5; }
        .case-solution { padding: 40px; background: #f0fdf4; border-top: 2px solid #dcfce7; }
        .p-space { margin-bottom: 20px; }

        /* Exam Components */
        .exam-header { text-align: center; background: var(--navy); color: white; padding: 40px; margin: -60px -60px 60px; }
        .q-block { margin-bottom: 60px; padding: 30px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .q-scenario { font-style: italic; color: #475569; margin-bottom: 25px; border-bottom: 1px solid #cbd5e1; padding-bottom: 20px; font-size: 1rem; }
        .option-label { 
            display: block; padding: 18px 25px; background: white; border: 2px solid #e2e8f0;
            border-radius: 8px; margin-top: 15px; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .option-label:hover { border-color: var(--alorica-red); background: #fef2f2; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        .btn-primary { 
            width: 100%; padding: 25px; background: var(--alorica-red); color: white; border: none;
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 40px;
        }
        .btn-retake { background: var(--navy); margin-top: 20px; }

        /* Pass/Fail Overlay */
        #result-overlay { 
            display: none; padding: 40px; border-radius: 12px; text-align: center; margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand-logo">ALORICA GLOBAL LEADERSHIP</div>
        <nav class="nav-group">
            <div class="nav-link active" onclick="navigate('theory')">Core Strategy & Theory</div>
            <div class="nav-link" onclick="navigate('cases')">Strategic Case Studies</div>
            <div class="nav-link" onclick="navigate('drills')">Operational Drills</div>
            <div class="nav-link" onclick="navigate('exam')">Day 1 Certification Exam</div>
        </nav>
    </aside>

    <main class="content-body" id="main-view">
        </main>
</div>

<script>
    // --- DATABASE ---
    const DB = {
        theory: {
            title: "Executive Customer Experience Management Theory",
            content: `
                <div class="theory-section">
                    <div class="exec-summary">Mastering Global BPO Dynamics</div>
                    <p class="theory-paragraph">The modern Customer Experience Manager (CXM) serves as the strategic fulcrum between high-scale operational logistics and brand-equity protection. Within the BPO ecosystem, the CXM is not merely a supervisor; they are the architect of a "Zero-Friction" environment. This role requires a sophisticated understanding of behavioral economics, specifically how customers perceive value during moments of service failure. The principle of the "Service Recovery Paradox" suggests that a customer who experiences a failure followed by an exceptional resolution becomes more loyal than a customer who never experienced a failure at all. Therefore, the CXM must engineer recovery protocols that are both proactive and emotionally calibrated.</p>
                    <p class="theory-paragraph">Peripheral strategic intelligence in this domain involves the management of "Linguistic Branding." At Alorica, our managers ensure that every interaction—whether via voice, chat, or social media—mirrors the client’s institutional voice. This requires a transition from "Template-Based Responses" to "Cognitive Empathy." By training frontline teams to identify a customer's psychological state through verbal cues and sentiment patterns, the CXM reduces the need for escalation. A 1% reduction in Redial Rate across a 1,000-seat program can result in millions of dollars in saved operational expenditure, directly impacting the profitability of the BPO contract.</p>
                    <p class="theory-paragraph">Furthermore, the CXM must master "Data-Driven Silo Destruction." Often, departments like Billing, Warehouse, and Tech operate as isolated entities. Friction occurs when a customer is trapped in the gaps between these silos. The CXM exercises "Horizontal Accountability," reaching across traditional department lines to secure resolutions. This involves high-level negotiation with client stakeholders to secure discretionary powers for the frontline. Empowering an agent to issue an immediate $50 credit without supervisor approval can improve First Call Resolution (FCR) by 18%, significantly boosting the Net Promoter Score (NPS) and neutralizing potential Detractors (DSAT).</p>
                    <p class="theory-paragraph">Finally, the executive manager focuses on "Predictive Journey Mapping." By analyzing historical DSAT trends, a CXM can predict where friction will occur before it happens. For example, if a software update is scheduled for Tuesday, the CXM should have already deployed "Defensive Messaging" across IVR channels by Monday evening. This proactive stance moves the organization from a "Crisis Management" culture to a "Quality Management" culture. In this training module, we will explore the nuances of ownership, the physics of friction, and the linguistic engineering required to maintain brand authority in the face of global volatility.</p>
                </div>
            `
        },
        cases: [
            {
                title: "CASE STUDY 01: The Global Infrastructure Cascade",
                problem: `
                    <p class="p-space">During a peak holiday quarter, a Tier-1 retail client suffered a massive database corruption that resulted in the duplication of 200,000 orders. Thousands of customers were charged twice, while others received shipping notifications for items they never ordered. The client's internal servers were unable to process refunds at scale, leading to a 400% surge in inbound call volume. The BPO floor at Alorica was hit with a 'Black Swan' event: wait times spiked to 3 hours, and the workforce was reaching a breaking point due to the relentless verbal abuse from panicked customers.</p>
                    <p class="p-space">The primary friction was not just the double charge, but the lack of transparency. The client's marketing team issued a vague apology on social media that didn't provide a timeline for refunds. Customers felt their financial security was at risk. Within the BPO, the internal silos between the 'Refunds Team' and 'Inbound Support' were paralyzed by a policy that required manual verification of every duplicate order—a task estimated to take 30 days. The risk was a total collapse of brand trust and a mass litigation event.</p>
                `,
                solution: `
                    <p class="p-space">The CX Manager initiated an 'Executive Silo Bypass.' They bypassed the manual verification policy by presenting a 'Risk-Benefit Analysis' to the client's CFO, proving that the cost of potential lawsuits outweighed the risk of occasional refund errors. The Manager secured a 'Blanket Authorization' for the BPO agents to issue immediate manual credits for any customer who could provide a bank screenshot. This eliminated the 30-day wait and empowered the frontline.</p>
                    <p class="p-space">Simultaneously, the Manager implemented 'Linguistic Hardening' across the floor. They removed phrases like 'I think' and 'We are trying' from the scripts, replacing them with: 'The refund protocol is active; your funds are verified for return within 48 hours.' They also created a 'Real-Time Dashboard' for the client to track refund velocity. By taking ownership of the technical recovery narrative and empowering the agents, the Manager reduced the 3-hour wait to 15 minutes within 72 hours, resulting in a 'Service Recovery' win that saved the client contract.</p>
                `
            },
            {
                title: "CASE STUDY 02: High-Value Detractor Neutralization",
                problem: `
                    <p class="p-space">A high-net-worth customer of a luxury travel client experienced a 'Systemic Failure' where their private jet booking was cancelled 2 hours before takeoff due to a billing mismatch. The customer, a billionaire CEO, was stranded with their family and called the Alorica support line. The junior agent, following the standard SOP, told the customer that 'Refunds take 7-10 business days' and that they would need to re-book online with a different card. This response was perceived as an insult to the customer's status and wealth.</p>
                    <p class="p-space">The customer began a live-stream on a platform with 2 million followers, detailing the 'Incompetence' of the brand. The brand's Chief Marketing Officer contacted the BPO Manager directly, demanding an immediate fix. The friction was caused by 'SOP Rigidity'—the agent was so focused on the rulebook that they failed to see the high-stakes reality of the person on the phone. The client's brand was being publicly dismantled in real-time.</p>
                `,
                solution: `
                    <p class="p-space">The CX Manager immediately 'Intercepted' the call and identified themselves as the Final Authority. Using 'Tactical Empathy,' the Manager stated: 'I have personally authorized a private charter via a secondary partner to ensure your itinerary is unaffected. My team will manage the billing reconciliation internally; your focus should remain on your travel.' This 'White Glove' ownership moved the problem away from the customer entirely.</p>
                    <p class="p-space">Following the resolution, the Manager implemented a 'VIP Sentiment Flag' in the CRM, which automatically routes high-value or high-risk social media influencers to a specialized 'Executive Response Team.' They coached the junior agent on 'Dynamic Authority,' teaching them when to break the SOP to save the relationship. The customer was so impressed by the 'Zero-Friction' recovery that they deleted the live-stream and replaced it with a video praising the brand's 'Unshakeable Commitment' to their clients.</p>
                `
            }
        ],
        exam: [
            {
                scenario: "An Alorica partner (a global electronics firm) launches a product that begins to overheat. 50,000 units are affected. Your agents are being told 'The product is fine' by the client, but customers are sending photos of melted components. Churn is increasing, and your NPS has plummeted from +60 to -20 in 48 hours. Your team is burnt out and the client is refusing to acknowledge a recall.",
                q: "As the CX Manager, what are the most strategic 'Institutional Ownership' moves? (Select ALL that apply)",
                options: [
                    {text: "Present the 'Sentiment Data' and photo evidence to the client's Head of Quality to force a 'Safety Protocol' update.", val: "a"},
                    {text: "Tell agents to continue the 'Product is Fine' script because the client is the boss.", val: "b"},
                    {text: "Implement a 'Proactive Exchange' bypass: Swap units for customers who send photo proof before the client officially calls a recall.", val: "c"},
                    {text: "Create a 'War Room' with the Training team to update the 'Stoic Anchor' scripts, focusing on safety assurance.", val: "d"}
                ],
                correct: ["a", "c", "d"]
            },
            {
                scenario: "A 'Friction Audit' reveals that 40% of your call volume comes from a 'Password Reset' loop that should be automated but is broken. Tech says they can't fix it for 2 months. Every time a customer calls for this, it costs the client $7.00 per interaction and wastes 10 minutes of an agent's time.",
                q: "How do you apply 'Silo-Breaking' and 'Extreme Ownership' here? (Select ALL correct)",
                options: [
                    {text: "Accept the 2-month timeline and hire more agents to handle the volume.", val: "a"},
                    {text: "Calculate the 'Total Waste Cost' ($7 x volume) and present it to the client to justify an emergency 'External API' fix.", val: "b"},
                    {text: "Create a 'Rapid Reset Team'—a small group of agents with higher permissions to solve these in 1 minute instead of 10.", val: "c"},
                    {text: "Draft an IVR 'Self-Help' announcement that directs customers to a temporary manual landing page you created.", val: "d"}
                ],
                correct: ["b", "c", "d"]
            },
            {
                scenario: "You are reviewing a 'Detractor' (DSAT) interaction. The customer was rude, but the agent's response was technically correct but sounded 'robotic and uncaring.' The customer wrote: 'They didn't even listen to me.'",
                q: "Which 'Tone Calibration' coaching is required? (Select ALL correct)",
                options: [
                    {text: "Teach 'Tactical Empathy': Acknowledge the frustration with 'It sounds like the timeline is the primary issue.'", val: "a"},
                    {text: "Tell the agent to be more emotional and cry with the customer.", val: "b"},
                    {text: "Implement 'Active Listening' drills: Training the agent to repeat the customer's core concern before answering.", val: "c"},
                    {text: "Shift to 'Solution-Forward' language: Focus on 'What we ARE doing' instead of 'What we CAN'T do.'", val: "d"}
                ],
                correct: ["a", "c", "d"]
            },
            {
                scenario: "A VIP client demands you fire a specific agent because the agent couldn't solve a problem that was actually a system error. The agent is one of your top performers.",
                q: "How do you maintain 'Executive Authority' and 'Institutional Shielding'?",
                options: [
                    {text: "Fire the agent immediately to keep the client happy.", val: "a"},
                    {text: "Take ownership: 'The failure was systemic, not individual; I am personally re-engineering the workflow for your account.'", val: "b"},
                    {text: "Protect the agent: 'Our internal audit confirms the protocol was followed; I am the point of contact for the resolution now.'", val: "c"},
                    {text: "Offer the client a service credit instead of firing the agent.", val: "d"}
                ],
                correct: ["b", "c", "d"]
            },
            {
                scenario: "NPS scores are down. You realize the 'Wait Time' on the IVR is telling people 'We value your time' while they wait for 40 minutes.",
                q: "What 'Friction Logic' change do you implement? (Select ALL correct)",
                options: [
                    {text: "Remove the 'We value your time' message—it is a 'Linguistic Irritant' during high wait times.", val: "a"},
                    {text: "Implement 'Callback Technology' so customers don't have to stay on the line.", val: "b"},
                    {text: "Increase the volume of the hold music.", val: "c"},
                    {text: "Deploy 'Expectation Management': Tell the customer the exact wait time (e.g., '35 minutes') immediately.", val: "d"}
                ],
                correct: ["a", "b", "d"]
            }
        ]
    };

    // --- LOGIC ---
    function navigate(view) {
        const main = document.getElementById('main-view');
        const links = document.querySelectorAll('.nav-link');
        links.forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(view === 'theory') {
            main.innerHTML = `<div class="certification-card"><h1>${DB.theory.title}</h1>${DB.theory.content}</div>`;
        } else if(view === 'cases') {
            let html = `<div class="certification-card"><h1>Strategic Case Study Repository</h1>`;
            DB.cases.forEach(c => {
                html += `
                    <div class="case-wrapper">
                        <div class="case-header">${c.title}</div>
                        <div class="case-content"><strong>CRITICAL PROBLEM SCENARIO:</strong>${c.problem}</div>
                        <div class="case-solution"><span class="sol-label">MANAGERIAL EXECUTION:</span>${c.solution}</div>
                    </div>
                `;
            });
            html += `</div>`;
            main.innerHTML = html;
        } else if(view === 'exam') {
            renderExam();
        } else if(view === 'drills') {
            main.innerHTML = `<div class="certification-card"><h1>Operational Drills</h1><p>Consult the theory and cases before taking the exam. Ensure your tone is 'Stoic' and your ownership is 'Extreme'.</p></div>`;
        }
        window.scrollTo(0,0);
    }

    function renderExam() {
        const main = document.getElementById('main-view');
        let html = `
            <div class="certification-card">
                <div class="exam-header">
                    <div style="text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">Certification Portal</div>
                    <h1 style="color:white; margin:0;">Customer Experience Manager: Day 1 Exam</h1>
                    <p>80% Passing Score Required for Credentialing</p>
                </div>
                <div id="quiz-container">
        `;

        DB.exam.forEach((q, i) => {
            html += `
                <div class="q-block">
                    <div class="q-scenario"><strong>SITUATION:</strong> ${q.scenario}</div>
                    <p><strong>QUESTION ${i+1}:</strong> ${q.q}</p>
                    ${q.options.map(opt => `
                        <label class="option-label">
                            <input type="checkbox" name="q${i}" value="${opt.val}"> ${opt.text}
                        </label>
                    `).join('')}
                </div>
            `;
        });

        html += `
            <button class="btn-primary" onclick="gradeExam()">Finalize Submission</button>
            <div id="result-overlay"></div>
            </div></div>
        `;
        main.innerHTML = html;
    }

    function gradeExam() {
        let score = 0;
        DB.exam.forEach((q, i) => {
            const checked = Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(el => el.value);
            const isCorrect = checked.length === q.correct.length && checked.every(v => q.correct.includes(v));
            if(isCorrect) score++;
        });

        const percent = (score / DB.exam.length) * 100;
        const overlay = document.getElementById('result-overlay');
        overlay.style.display = 'block';

        if(percent >= 80) {
            overlay.innerHTML = `
                <h2 style="color:var(--emerald);">CERTIFICATION GRANTED</h2>
                <p style="font-size:1.5rem;">Your Score: ${percent}% (${score}/5)</p>
                <p>You have demonstrated the required proficiency in Stoic Authority and Extreme Ownership.</p>
            `;
            overlay.style.background = "#f0fdf4";
        } else {
            overlay.innerHTML = `
                <h2 style="color:var(--alorica-red);">CERTIFICATION DENIED</h2>
                <p style="font-size:1.5rem;">Your Score: ${percent}% (${score}/5)</p>
                <p>An 80% score is required. Please review the Case Studies and Theory before retaking.</p>
                <button class="btn-primary btn-retake" onclick="renderExam()">Retake Examination</button>
            `;
            overlay.style.background = "#fef2f2";
        }
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = () => navigate('theory');
</script>

</body>
</html>
