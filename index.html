<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive CX Leadership Academy</title>
    <style>
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #2563eb;
            --white: #ffffff; --bg: #f1f5f9; --text: #334155;
            --success: #16a34a; --warning: #ea580c; --danger: #dc2626;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.8; }
        
        /* Layout */
        .sidebar { width: 300px; background: var(--primary); color: white; position: fixed; height: 100%; display: flex; flex-direction: column; }
        .main { margin-left: 300px; padding: 40px; min-height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar-header { padding: 30px; font-weight: 800; font-size: 1.5rem; color: var(--accent); border-bottom: 1px solid #334155; }
        .nav-item { padding: 20px 30px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; color: #94a3b8; font-weight: 600; }
        .nav-item.active { background: #1e293b; color: white; border-left-color: var(--accent); }
        .nav-item:hover { background: #1e293b; color: white; }

        /* Sub-Topic Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: #64748b; border-radius: 5px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* Content Modules */
        .card { background: white; padding: 50px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--accent); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h1, h2 { color: var(--primary); }
        .theory-block { margin-bottom: 40px; text-align: justify; }
        
        .section-box { margin: 30px 0; border-radius: 8px; padding: 30px; }
        .problem-box { background: #fff1f2; border-left: 6px solid var(--danger); }
        .case-study-box { background: #fff7ed; border-left: 6px solid var(--warning); }
        .solution-box { background: #f0fdf4; border-left: 6px solid var(--success); }
        .box-title { font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; font-size: 0.9rem; }

        /* Quiz */
        .quiz-section { background: #f8fafc; padding: 40px; border-radius: 12px; margin-top: 50px; border: 2px solid #e2e8f0; }
        .q-item { margin-bottom: 25px; padding: 20px; background: white; border-radius: 8px; border: 1px solid #cbd5e1; }
        .opt-label { display: block; padding: 15px; margin: 10px 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .opt-label:hover { border-color: var(--accent); background: #eff6ff; }
        .btn-submit { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">CX STRATEGY LAB</div>
    <div class="nav-item active" onclick="loadDay(1)">Day 1: Brand Authority</div>
    <div class="nav-item" onclick="loadDay(2)">Day 2: Ownership Logic</div>
    <div class="nav-item">Day 3: Journey Calibration 🔒</div>
    <div class="nav-item">Day 4: Friction Analysis 🔒</div>
    <div class="nav-item">Day 5: Executive Exit 🔒</div>
</div>

<div class="main">
    <div id="content-area">
        </div>
</div>

<script>
    const trainingData = {
        1: {
            title: "Day 1: Establishing Brand Authority",
            tabs: [
                {
                    name: "Institutional Identity",
                    theory: `Institutional Identity is the psychological bedrock of high-stakes customer experience. As a manager, you transition from being a 'service provider' to becoming the 'Voice of the Institution.' This requires a specific linguistic shift from individualistic responses to systematic ones. When a leader speaks, the customer must perceive a stable, unshakeable entity that is unaffected by the chaos of the immediate failure. This theory suggests that trust is not built through apologies alone, but through the projection of competence. By adopting a prescriptive persona, you eliminate the customer's perceived need to escalate, as they feel they have already reached the highest authority. This identity is maintained through consistent tone, technical precision, and the removal of emotional variance in communication.`,
                    problem: `A high-frequency trading firm experienced a 15-minute data lag during a market surge. Thousands of clients were losing thousands of dollars per second. The frontline support team began sending emotional, panicked apologies, which signaled to the clients that the company was out of control. This caused a massive withdrawal of funds and a social media firestorm, as customers feared a total collapse of the firm's infrastructure.`,
                    case: `In a similar event at a competitor firm, the CX Lead took over all outgoing comms. They implemented a 'Silent Professional' protocol. No apologies were issued in the first 10 minutes; instead, a technical 'Hardening Update' was broadcasted. By framing the failure as a 'Calculated Safety Interruption,' the manager projected that the company was in control of the outage rather than a victim of it.`,
                    solution: `The solution involves the immediate deployment of a 'Command Tone' template. The Manager must audit all frontline communications and remove 'Weak Subjects' (I, me, sorry). They replace them with 'Institutional Subjects' (Our Engineering Lead, The Protocol, Verified Status). By shifting the subject of the conversation from human error to systematic process, the Manager stabilizes the brand's equity and prevents long-term churn.`
                },
                {
                    name: "Tone Calibration",
                    theory: `Tone Calibration is the process of normalizing the emotional output of a support organization. In corporate environments, emotional volatility is a liability. A manager's role is to ensure the team operates within a 'Professional Neutrality' window. This theory posits that customers react to the emotional state of the agent as much as the solution itself. If an agent is too eager, they appear untrustworthy; if too cold, they appear negligent. Calibration involves training the 'Somatic Voice'—the depth and pace of communication—to remain steady regardless of the customer's aggression level. This creates an 'Emotional Anchor' that eventually pulls the customer's frustration back to a logical level, allowing for faster technical resolutions.`,
                    problem: `An e-commerce brand's social media team was 'clapping back' at angry customers in a misguided attempt to be 'authentic' and 'edgy.' While this worked for minor issues, during a major shipping delay, it backfired. Customers perceived the brand as flippant and disrespectful of their money. The 'humorous' tone became a weapon used against the company in PR circles, leading to a 20% drop in brand sentiment.`,
                    case: `A luxury hotel group faced a bedbug scare. The Manager enforced a 'Zero-Adjective' policy. Staff were prohibited from using any words that carried emotional weight (e.g., 'terrible', 'unfortunate', 'scary'). Instead, they used purely functional nouns and verbs. This clinical tone effectively 'cooled' the heat of the situation, making the problem seem like a minor technical maintenance task rather than a health crisis.`,
                    solution: `The Manager must implement a 'Tone Filter' in the CRM. Before any escalation is sent, it is reviewed for 'Adjective Density.' Any response containing more than two emotional descriptors is sent back for rewrite. The solution is to move toward a 'Bullet-Point' culture—where facts are prioritized over narratives, ensuring the brand sounds like a reliable utility rather than a desperate individual.`
                }
            ],
            quiz: [
                { q: "During a crisis, why is 'Institutional Identity' superior to a 'Personal' identity?", a: "It makes the customer feel like they are talking to a friend.", b: "It projects systematic stability and competence, reducing the customer's need to escalate.", correct: "b" },
                { q: "What does the 'Zero-Adjective' policy aim to achieve?", a: "To make the staff sound more like robots.", b: "To remove emotional heat and treat the problem as a purely technical maintenance task.", correct: "b" },
                { q: "How should a manager handle 'Weak Subjects' in a team's writing?", a: "Tell the team to apologize more to compensate.", b: "Audit drafts and replace 'I/Me' with 'Our Protocol' or 'The Verified Status'.", correct: "b" },
                { q: "What is the primary danger of using a 'Humorous' tone during a major service failure?", a: "It makes the email too long.", b: "It signals flippancy and a lack of respect for the customer's financial or operational impact.", correct: "b" },
                { q: "Tone Calibration is about keeping the team's emotional variance within:", a: "A wide range to show personality.", b: "A narrow, professional window to ensure reliability.", correct: "b" }
            ]
        }
    };

    function loadDay(dayNum) {
        const day = trainingData[dayNum];
        if(!day) return;
        
        let html = `<h1>${day.title}</h1>`;
        html += `<div class="tabs">`;
        day.tabs.forEach((tab, i) => {
            html += `<button class="tab-btn ${i===0?'active':''}" onclick="showTab(${i})">${tab.name}</button>`;
        });
        html += `<button class="tab-btn" style="background:#0f172a; color:white" onclick="showQuiz(${dayNum})">DAY ${dayNum} QUIZ</button>`;
        html += `</div>`;
        
        html += `<div id="tab-content">`;
        html += renderTab(day.tabs[0]);
        html += `</div>`;
        
        document.getElementById('content-area').innerHTML = html;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function renderTab(tab) {
        return `
            <div class="card">
                <h2>${tab.name}</h2>
                <div class="theory-block">
                    <strong>EXECUTIVE THEORY:</strong><br>
                    ${tab.theory}
                </div>
                <div class="section-box problem-box">
                    <span class="box-title">Critical Problem Scenario</span>
                    <p>${tab.problem}</p>
                </div>
                <div class="section-box case-study-box">
                    <span class="box-title">Strategic Case Study</span>
                    <p>${tab.case}</p>
                </div>
                <div class="section-box solution-box">
                    <span class="box-title">Managerial Solution</span>
                    <p>${tab.solution}</p>
                </div>
            </div>
        `;
    }

    function showTab(index) {
        const dayNum = document.querySelector('.nav-item.active').innerText.includes('1') ? 1 : 2;
        const tab = trainingData[dayNum].tabs[index];
        document.getElementById('tab-content').innerHTML = renderTab(tab);
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
        });
    }

    function showQuiz(dayNum) {
        const quiz = trainingData[dayNum].quiz;
        let html = `<div class="quiz-section"><h2>Final Gatekeeper Assessment</h2>`;
        quiz.forEach((q, i) => {
            html += `
                <div class="q-item">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <label class="opt-label"><input type="radio" name="q${i}" value="a"> A) ${q.a}</label>
                    <label class="opt-label"><input type="radio" name="q${i}" value="b"> B) ${q.b}</label>
                </div>
            `;
        });
        html += `<button class="btn-submit" onclick="submitQuiz(${dayNum})">SUBMIT FOR CERTIFICATION</button><div id="score"></div></div>`;
        document.getElementById('tab-content').innerHTML = html;
    }

    function submitQuiz(dayNum) {
        const quiz = trainingData[dayNum].quiz;
        let score = 0;
        let answered = 0;
        quiz.forEach((q, i) => {
            const res = document.querySelector(`input[name="q${i}"]:checked`);
            if(res) {
                answered++;
                if(res.value === q.correct) score++;
            }
        });

        if(answered < 5) {
            alert("Please answer all 5 questions.");
        } else {
            const pass = score >= 4;
            document.getElementById('score').innerHTML = `<h3 style="color:${pass? 'green':'red'}">SCORE: ${score}/5 - ${pass? 'PASSED! Day 2 Unlocked.':'FAILED. Please review the tabs.'}</h3>`;
        }
    }

    // Load Default
    window.onload = () => loadDay(1);
</script>

</body>
</html>
