    // --- LOGIC ---
    function navigate(view) {
        const main = document.getElementById('main-view');
        const links = document.querySelectorAll('.nav-link');
        links.forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(view === 'theory') {
            main.innerHTML = `<div class="certification-card"><h1>${DB.theory.title}</h1>${DB.theory.content}</div>`;
        } else if(view === 'cases') {
            let html = `<div class="certification-card"><h1>Strategic Case Study Repository</h1>`;
            DB.cases.forEach(c => {
                html += `
                    <div class="case-wrapper">
                        <div class="case-header">${c.title}</div>
                        <div class="case-content"><strong>CRITICAL PROBLEM SCENARIO:</strong>${c.problem}</div>
                        <div class="case-solution"><span class="sol-label">MANAGERIAL EXECUTION:</span>${c.solution}</div>
                    </div>
                `;
            });
            html += `</div>`;
            main.innerHTML = html;
        } else if(view === 'exam') {
            renderExam();
        } else if(view === 'drills') {
            main.innerHTML = `<div class="certification-card"><h1>Operational Drills</h1><p>Consult the theory and cases before taking the exam. Ensure your tone is 'Stoic' and your ownership is 'Extreme'.</p></div>`;
        }
        window.scrollTo(0,0);
    }

    function renderExam() {
        const main = document.getElementById('main-view');
        let html = `
            <div class="certification-card">
                <div class="exam-header">
                    <div style="text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">Certification Portal</div>
                    <h1 style="color:white; margin:0;">Customer Experience Manager: Day 1 Exam</h1>
                    <p>80% Passing Score Required for Credentialing</p>
                </div>
                <div id="quiz-container">
        `;

        DB.exam.forEach((q, i) => {
            html += `
                <div class="q-block">
                    <div class="q-scenario"><strong>SITUATION:</strong> ${q.scenario}</div>
                    <p><strong>QUESTION ${i+1}:</strong> ${q.q}</p>
                    ${q.options.map(opt => `
                        <label class="option-label">
                            <input type="checkbox" name="q${i}" value="${opt.val}"> ${opt.text}
                        </label>
                    `).join('')}
                </div>
            `;
        });

        html += `
            <button class="btn-primary" onclick="gradeExam()">Finalize Submission</button>
            <div id="result-overlay"></div>
            </div></div>
        `;
        main.innerHTML = html;
    }

    function gradeExam() {
        let score = 0;
        DB.exam.forEach((q, i) => {
            const checked = Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(el => el.value);
            const isCorrect = checked.length === q.correct.length && checked.every(v => q.correct.includes(v));
            if(isCorrect) score++;
        });

        const percent = (score / DB.exam.length) * 100;
        const overlay = document.getElementById('result-overlay');
        overlay.style.display = 'block';

        if(percent >= 80) {
            overlay.innerHTML = `
                <h2 style="color:var(--emerald);">CERTIFICATION GRANTED</h2>
                <p style="font-size:1.5rem;">Your Score: ${percent}% (${score}/5)</p>
                <p>You have demonstrated the required proficiency in Stoic Authority and Extreme Ownership.</p>
            `;
            overlay.style.background = "#f0fdf4";
        } else {
            overlay.innerHTML = `
                <h2 style="color:var(--alorica-red);">CERTIFICATION DENIED</h2>
                <p style="font-size:1.5rem;">Your Score: ${percent}% (${score}/5)</p>
                <p>An 80% score is required. Please review the Case Studies and Theory before retaking.</p>
                <button class="btn-primary btn-retake" onclick="renderExam()">Retake Examination</button>
            `;
            overlay.style.background = "#fef2f2";
        }
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = () => navigate('theory');
</script>
